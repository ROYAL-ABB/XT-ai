<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xt-ai // Telemetry Target Suite</title>
    <style>
        :root {
            --bg: #070a12;
            --panel: #0f1624;
            --accent: #2563eb;
            --success: #00ffaa;
            --error: #ff3b3b;
            --warn: #ffaa00;
            --text: #f1f5f9;
            --text-muted: #4b5563;
            --border: #1e293b;
        }

        body {
            font-family: 'Courier New', Courier, monospace, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            height: 100vh;
            box-sizing: border-box;
        }

        .app-container {
            width: 100%;
            max-width: 1400px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            height: 100%;
        }

        @media (min-width: 992px) {
            .app-container { 
                grid-template-columns: 2.8fr 1.2fr;
                grid-template-rows: auto 1fr;
            }
        }

        header {
            grid-column: 1 / -1;
            text-align: left;
            padding-bottom: 10px;
            border-bottom: 2px dashed #1e293b;
        }

        h1 { margin: 0 0 5px 0; font-size: 1.6rem; letter-spacing: 1px; color: var(--success); }
        header p { margin: 0; color: #64748b; font-size: 0.9rem; }

        .panel {
            background: var(--panel);
            border-radius: 4px;
            padding: 20px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .workspace-left {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .viewer-box {
            width: 100%;
            position: relative;
            aspect-ratio: 16 / 9;
            background: #020408;
            border-radius: 4px;
            overflow: hidden;
            border: 2px solid #27354f;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        canvas#motionOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* High-Vis Pro HUD Recording Badge */
        .rec-indicator {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 59, 59, 0.15);
            padding: 6px 14px;
            border-radius: 3px;
            border: 1px solid var(--error);
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 20;
            font-size: 0.75rem;
            font-weight: 900;
            letter-spacing: 1.5px;
            color: #fff;
            backdrop-filter: blur(8px);
            box-shadow: 0 0 15px rgba(255, 59, 59, 0.3);
        }

        .rec-indicator.active {
            display: flex;
        }

        .rec-dot {
            width: 8px;
            height: 8px;
            background: var(--error);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--error);
            animation: blink 0.8s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .controls-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            background: #0b101b;
            padding: 15px;
            border-radius: 4px;
            border: 1px solid #1e293b;
        }

        select, button {
            padding: 10px 16px;
            border-radius: 3px;
            font-size: 0.85rem;
            font-weight: bold;
            font-family: inherit;
            border: 1px solid #27354f;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        select {
            background: #151f32;
            color: var(--text);
            flex: 1;
            min-width: 150px;
        }

        .btn-blue { background: #1e40af; color: white; border-color: #3b82f6; }
        .btn-blue:hover { background: #2563eb; box-shadow: 0 0 10px rgba(59,130,246,0.4); }
        .btn-warn { background: #78350f; color: white; border-color: #d97706; }

        .sensitivity-panel {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.8rem;
            color: #94a3b8;
            background: #151f32;
            padding: 6px 14px;
            border-radius: 3px;
            border: 1px solid #27354f;
        }

        .sidebar-right {
            max-height: 75vh;
            overflow: hidden;
        }

        .sidebar-title {
            margin: 0 0 15px 0;
            font-size: 1.0rem;
            letter-spacing: 1px;
            border-bottom: 2px dashed var(--border);
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #94a3b8;
        }

        .counter-badge {
            background: #1e293b;
            color: var(--success);
            font-size: 0.75rem;
            padding: 4px 10px;
            border: 1px solid #27354f;
            border-radius: 2px;
        }

        .capture-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-right: 5px;
        }

        .capture-card {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #0b101b;
            padding: 12px;
            border-radius: 4px;
            border: 1px solid #1e293b;
            animation: slideIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .capture-card video {
            width: 100%;
            border-radius: 2px;
            background: #000;
            border: 1px solid #27354f;
        }

        .capture-details {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .capture-name { font-size: 0.8rem; font-weight: bold; color: var(--success); }
        .capture-time { font-size: 0.75rem; color: #64748b; }
        
        .download-btn {
            background: #151f32;
            color: var(--success);
            border: 1px solid #00ffaa33;
            padding: 4px 8px;
            font-size: 0.75rem;
            border-radius: 2px;
            text-decoration: none;
            text-align: center;
        }
        .download-btn:hover { background: #00ffaa11; border-color: var(--success); }

        .status-msg {
            grid-column: 1 / -1;
            padding: 12px;
            border-radius: 4px;
            font-size: 0.85rem;
            display: none;
        }
        .msg-error { background: rgba(255, 59, 59, 0.1); border: 1px solid var(--error); color: #fca5a5; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>SYS.MATRIX // TACTICAL TELEMETRY LOCK</h1>
        <p>Instantaneous zero-lag stream generation with crosshair coordinate bounding brackets.</p>
    </header>

    <div id="statusAlert" class="status-msg"></div>

    <div class="panel workspace-left">
        <div class="viewer-box">
            <!-- HUD Warning Header Signal Sign -->
            <div id="recSign" class="rec-indicator">
                <div class="rec-dot"></div>
                <span>FEED RECORDING LINK ACTIVE</span>
            </div>
            
            <video id="viewscreen" autoplay playsinline muted></video>
            <canvas id="motionOverlay"></canvas>
        </div>
        <div class="controls-row">
            <button class="btn-blue" id="initBtn">MOUNT HARDWARE</button>
            <select id="selector"><option value="">SCANNING PERIPHERALS...</option></select>
            <button class="btn-warn" id="bypassBtn" style="display:none;">FORCE FEED</button>
            
            <div class="sensitivity-panel">
                <label for="thresholdSlider">SENSITIVITY</label>
                <input type="range" id="thresholdSlider" min="10" max="60" value="20" style="cursor:pointer; accent-color:var(--success);">
            </div>
        </div>
    </div>

    <div class="panel sidebar-right">
        <h3 class="sidebar-title">
            ARCHIVE REELS 
            <span class="counter-badge" id="logCount">0 SECURED</span>
        </h3>
        <div class="capture-list" id="captureContainer"></div>
    </div>
</div>

<script>
    const video = document.getElementById('viewscreen');
    const overlay = document.getElementById('motionOverlay');
    const context = overlay.getContext('2d');
    
    const initBtn = document.getElementById('initBtn');
    const selector = document.getElementById('selector');
    const bypassBtn = document.getElementById('bypassBtn');
    const statusAlert = document.getElementById('statusAlert');
    const captureContainer = document.getElementById('captureContainer');
    const logCount = document.getElementById('logCount');
    const thresholdSlider = document.getElementById('thresholdSlider');
    const recSign = document.getElementById('recSign');

    let localStream = null;
    let animationFrameId = null;
    
    let prevFrameData = null;
    let activeLogCount = 0;
    
    let mediaRecorder = null;
    let recordedChunks = [];
    let isRecording = false;
    let isRecorderStopping = false;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playChime(type) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        if (type === 'start') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime); 
            gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        } else {
            osc.type = 'square';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        }
    }

    initBtn.addEventListener('click', async () => {
        showAlert("", "");
        bypassBtn.style.display = "none";
        try {
            const check = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            check.getTracks().forEach(t => t.stop()); 
            await findVideoChannels();
        } catch (e) {
            showAlert("error", `CRITICAL_ACCESS_DENIED: ${e.message}`);
        }
    });

    bypassBtn.addEventListener('click', async () => {
        showAlert("", "");
        if (localStream) { localStream.getTracks().forEach(t => t.stop()); }
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            bindStreamToUI(localStream);
        } catch (e) {
            showAlert("error", `Emergency bypass failed. Driver array locked.`);
        }
    });

    async function findVideoChannels() {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoDevices = devices.filter(d => d.kind === 'videoinput');

        selector.innerHTML = '';
        if (videoDevices.length === 0) {
            selector.innerHTML = '<option>NO DISCOVERED HARDWARE</option>';
            return;
        }

        videoDevices.forEach((cam, index) => {
            const node = document.createElement('option');
            node.value = cam.deviceId;
            node.text = cam.label || `STREAM CHANNEL MATRX-${index + 1}`;
            selector.appendChild(node);
        });

        executeRescueStream(videoDevices[0].deviceId);
    }

    async function executeRescueStream(hardwareId) {
        if (localStream) { localStream.getTracks().forEach(t => t.stop()); }
        let options = { video: { deviceId: hardwareId ? { exact: hardwareId } : undefined }, audio: true };
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia(options);
            bindStreamToUI(stream);
        } catch (firstError) {
            let rescueOptions = {
                video: { deviceId: hardwareId ? { exact: hardwareId } : undefined, width: { ideal: 640 }, height: { ideal: 480 } },
                audio: true
            };
            try {
                const stream = await navigator.mediaDevices.getUserMedia(rescueOptions);
                bindStreamToUI(stream);
            } catch (secondError) {
                bypassBtn.style.display = "inline-block";
                showAlert("error", "LINK FAILURE: Feed occupied. Force mounting required.");
            }
        }
    }

    function bindStreamToUI(stream) {
        localStream = stream;
        video.srcObject = stream;
        showAlert("", ""); 
        
        video.onloadedmetadata = () => {
            overlay.width = video.videoWidth;
            overlay.height = video.videoHeight;
            startMotionDetectionPipeline();
        };
    }

    function startMotionDetectionPipeline() {
        if (animationFrameId) cancelAnimationFrame(animationFrameId);

        const processWidth = 160;
        const processHeight = 120;
        const processCanvas = document.createElement('canvas');
        processCanvas.width = processWidth;
        processCanvas.height = processHeight;
        const processCtx = processCanvas.getContext('2d');

        function scanFrame() {
            if (video.paused || video.ended) {
                animationFrameId = requestAnimationFrame(scanFrame);
                return;
            }

            processCtx.drawImage(video, 0, 0, processWidth, processHeight);
            const currentFrameData = processCtx.getImageData(0, 0, processWidth, processHeight);
            
            context.clearRect(0, 0, overlay.width, overlay.height);

            let motionDetected = false;
            let minX = processWidth, maxX = 0;
            let minY = processHeight, maxY = 0;
            let changedCount = 0;

            if (prevFrameData) {
                const threshold = parseInt(thresholdSlider.value);

                for (let y = 0; y < processHeight; y++) {
                    for (let x = 0; x < processWidth; x++) {
                        const i = (y * processWidth + x) * 4;
                        
                        const rDiff = Math.abs(currentFrameData.data[i] - prevFrameData.data[i]);
                        const gDiff = Math.abs(currentFrameData.data[i+1] - prevFrameData.data[i+1]);
                        const bDiff = Math.abs(currentFrameData.data[i+2] - prevFrameData.data[i+2]);
                        
                        if ((rDiff + gDiff + bDiff) / 3 > threshold) {
                            changedCount++;
                            if (x < minX) minX = x;
                            if (x > maxX) maxX = x;
                            if (y < minY) minY = y;
                            if (y > maxY) maxY = y;
                        }
                    }
                }

                if (changedCount > 6) { 
                    motionDetected = true;
                }
            }

            // High-End Cyber Target Locking Bracket Display Mechanics
            if (motionDetected && minX <= maxX && minY <= maxY) {
                const scaleX = overlay.width / processWidth;
                const scaleY = overlay.height / processHeight;

                const padding = 15;
                const boxX = Math.max(0, (minX * scaleX) - padding);
                const boxY = Math.max(0, (minY * scaleY) - padding);
                const boxWidth = Math.min(overlay.width - boxX, ((maxX - minX) * scaleX) + (padding * 2));
                const boxHeight = Math.min(overlay.height - boxY, ((maxY - minY) * scaleY) + (padding * 2));

                context.strokeStyle = 'var(--success)';
                context.lineWidth = 2;
                
                // Draw Professional Tactical Target Corners instead of a boring basic square
                const len = Math.min(20, boxWidth * 0.2); // Bracket arm length
                
                // Top-Left Bracket
                context.beginPath(); context.moveTo(boxX, boxY + len); context.lineTo(boxX, boxY); context.lineTo(boxX + len, boxY); context.stroke();
                // Top-Right Bracket
                context.beginPath(); context.moveTo(boxX + boxWidth, boxY + len); context.lineTo(boxX + boxWidth, boxY); context.lineTo(boxX + boxWidth - len, boxY); context.stroke();
                // Bottom-Left Bracket
                context.beginPath(); context.moveTo(boxX, boxY + boxHeight - len); context.lineTo(boxX, boxY + boxHeight); context.lineTo(boxX + len, boxY + boxHeight); context.stroke();
                // Bottom-Right Bracket
                context.beginPath(); context.moveTo(boxX + boxWidth, boxY + boxHeight - len); context.lineTo(boxX + boxWidth, boxY + boxHeight); context.lineTo(boxX + boxWidth - len, boxY + boxHeight); context.stroke();

                // Telemetry Tracking Label & Digital Readouts
                context.fillStyle = 'var(--success)';
                context.font = 'bold 10px monospace';
                context.fillText(`LOCK // X:${Math.round(boxX)} Y:${Math.round(boxY)}`, boxX + 4, boxY - 6);
                context.fillText(`DIM // ${Math.round(boxWidth)}x${Math.round(boxHeight)}`, boxX + 4, boxY + boxHeight + 14);
            }

            // Zero-Latency Immediate Recording Pipeline State Switching
            if (motionDetected) {
                if (!isRecording && !isRecorderStopping) {
                    startRecordingSequence();
                }
            } else {
                // Instantly stops recording the exact frame motion is no longer found
                if (isRecording) {
                    stopRecordingSequence();
                }
            }

            prevFrameData = currentFrameData;
            animationFrameId = requestAnimationFrame(scanFrame);
        }

        animationFrameId = requestAnimationFrame(scanFrame);
    }

    function startRecordingSequence() {
        isRecording = true;
        recordedChunks = [];
        playChime('start');
        
        recSign.classList.add('active');

        let options = { mimeType: 'video/webm;codecs=vp9,opus' };
        if (!MediaRecorder.isTypeSupported(options.mimeType)) {
            options = { mimeType: 'video/webm;codecs=vp8,opus' };
        }
        if (!MediaRecorder.isTypeSupported(options.mimeType)) {
            options = { mimeType: 'video/mp4' }; 
        }

        try {
            mediaRecorder = new MediaRecorder(localStream, options);
        } catch (e) {
            mediaRecorder = new MediaRecorder(localStream); 
        }

        mediaRecorder.ondataavailable = (event) => {
            if (event.data && event.data.size > 0) {
                recordedChunks.push(event.data);
            }
        };

        mediaRecorder.onstop = () => {
            compileVideoFile();
            isRecording = false;
            isRecorderStopping = false; 
            recSign.classList.remove('active');
        };

        mediaRecorder.start(500); // 500ms chunking slices for instant closure saving
    }

    function stopRecordingSequence() {
        if (mediaRecorder && mediaRecorder.state !== 'inactive' && !isRecorderStopping) {
            isRecorderStopping = true; 
            mediaRecorder.stop();
            playChime('stop');
        }
    }

    function compileVideoFile() {
        if (recordedChunks.length === 0) return;
        
        activeLogCount++;
        logCount.textContent = `${activeLogCount} SECURED`;

        const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType || 'video/webm' });
        const videoUrl = URL.createObjectURL(blob);
        const timestamp = new Date().toLocaleTimeString();
        
        const card = document.createElement('div');
        card.className = 'capture-card';
        
        card.innerHTML = `
            <video src="${videoUrl}" controls playsinline></video>
            <div class="capture-details">
                <div>
                    <div class="capture-name">REEL_LOG_${9000 + activeLogCount}</div>
                    <div class="capture-time">INDEXED [${timestamp}]</div>
                </div>
                <a href="${videoUrl}" download="Matrix_Capture_${9000 + activeLogCount}.webm" class="download-btn">DOWNLOAD</a>
            </div>
        `;
        
        captureContainer.insertBefore(card, captureContainer.firstChild);
    }

    function showAlert(type, msg) {
        if(!msg) { statusAlert.style.display = "none"; return; }
        statusAlert.className = `status-msg msg-${type}`;
        statusAlert.textContent = msg;
        statusAlert.style.display = "block";
    }

    selector.addEventListener('change', (e) => {
        if (e.target.value) executeRescueStream(e.target.value);
    });
</script>
</body>
</html>
