<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xt-ai // Pure Hardware Cam Tester</title>
    <style>
        :root {
            --bg: #090d16;
            --panel: #131a26;
            --accent: #2563eb;
            --success: #059669;
            --error: #dc2626;
            --warn: #d97706;
            --text: #f1f5f9;
            --text-muted: #64748b;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .app-container { grid-template-columns: 3fr 2fr; }
        }

        header {
            grid-column: 1 / -1;
            text-align: center;
            padding-bottom: 10px;
            border-bottom: 1px solid #1e293b;
        }

        h1 { margin: 0 0 5px 0; font-size: 1.8rem; }
        header p { margin: 0; color: var(--text-muted); }

        .panel {
            background: var(--panel);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #1e293b;
        }

        .viewer-box {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #334155;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .controls-row {
            margin-top: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        select, button {
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }

        select {
            background: #1e293b;
            color: var(--text);
            border: 1px solid #334155;
            flex: 1;
            min-width: 150px;
        }

        .btn-blue { background: var(--accent); color: white; }
        .btn-green { background: var(--success); color: white; }

        .data-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            padding-bottom: 8px;
            border-bottom: 1px solid #1e293b;
        }

        .status-msg {
            grid-column: 1 / -1;
            padding: 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            display: none;
        }
        .msg-warn { background: rgba(217, 119, 6, 0.15); border: 1px solid var(--warn); color: #fde68a; }
        .msg-error { background: rgba(220, 38, 38, 0.15); border: 1px solid var(--error); color: #fca5a5; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>xt-ai // Live Cam System</h1>
        <p>Direct hardware testing utility pipeline.</p>
    </header>

    <div id="statusAlert" class="status-msg"></div>

    <div class="panel">
        <div class="viewer-box">
            <video id="viewscreen" autoplay playsinline muted></video>
        </div>
        <div class="controls-row">
            <button class="btn-blue" id="initBtn">Scan Channels</button>
            <select id="selector"><option value="">Awaiting Device Scan...</option></select>
            <button class="btn-green" id="snapBtn">Capture Frame</button>
        </div>
    </div>

    <div class="panel">
        <h3 style="margin-top: 0; border-bottom: 1px solid #1e293b; padding-bottom: 8px;">Telemetry Logs</h3>
        <div class="data-list">
            <div class="data-row"><span class="lbl">Link Engine</span><span id="connState" style="color:var(--error)">Offline</span></div>
            <div class="data-row"><span class="lbl">Resolution</span><span id="resOut">-</span></div>
            <div class="data-row"><span class="lbl">Aspect Ratio</span><span id="aspectOut">-</span></div>
            <div class="data-row"><span class="lbl">Device Mode</span><span id="modeOut">Standard Protocol</span></div>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('viewscreen');
    const initBtn = document.getElementById('initBtn');
    const selector = document.getElementById('selector');
    const statusAlert = document.getElementById('statusAlert');
    
    const connState = document.getElementById('connState');
    const resOut = document.getElementById('resOut');
    const aspectOut = document.getElementById('aspectOut');
    const modeOut = document.getElementById('modeOut');

    let localStream = null;

    initBtn.addEventListener('click', async () => {
        showAlert("", "");
        try {
            // Step 1: Request bare minimum initialization permission
            const check = await navigator.mediaDevices.getUserMedia({ video: true });
            check.getTracks().forEach(t => t.stop()); // clear test track immediately
            await findVideoChannels();
        } catch (e) {
            showAlert("error", `Permission/Access Blocked: ${e.message}`);
        }
    });

    async function findVideoChannels() {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoDevices = devices.filter(d => d.kind === 'videoinput');

        selector.innerHTML = '';
        if (videoDevices.length === 0) {
            selector.innerHTML = '<option>No hardware discovered</option>';
            return;
        }

        videoDevices.forEach((cam, index) => {
            const node = document.createElement('option');
            node.value = cam.deviceId;
            node.text = cam.label || `Video Channel ${index + 1}`;
            selector.appendChild(node);
        });

        // Auto launch first picked item using new protective matrix
        executeRescueStream(videoDevices[0].deviceId);
    }

    async function executeRescueStream(hardwareId) {
        if (localStream) {
            localStream.getTracks().forEach(t => t.stop());
        }

        // Configuration Tier 1: Pure basic request
        let options = { video: { deviceId: hardwareId ? { exact: hardwareId } : undefined } };
        
        try {
            await startVideoFeed(options);
            modeOut.textContent = "Native Hardware Mode";
        } catch (firstError) {
            console.warn("Standard stream failed. Initiating Rescue Fallback Sequence...", firstError);
            
            // Configuration Tier 2: The Rescue Matrix
            // Strips down resolutions completely so weak USB port bandwidth or minor software locks are bypassed.
            showAlert("warn", "System warning: Camera responded with a lock error. Attempting to bypass hardware restrictions...");
            
            let rescueOptions = {
                video: {
                    deviceId: hardwareId ? { exact: hardwareId } : undefined,
                    width: { ideal: 640 }, 
                    height: { ideal: 480 },
                    frameRate: { max: 15 } // Lower data rate significantly to force connection
                }
            };

            try {
                await startVideoFeed(rescueOptions);
                modeOut.textContent = "Safe-Mode Rescue Active";
                showAlert("", ""); // Clear the warning if safe mode succeeded
            } catch (secondError) {
                console.error("Rescue configuration matrix exhausted.", secondError);
                connState.textContent = "Lock State";
                connState.style.color = "var(--error)";
                showAlert("error", "Hardware Critical: Your computer reports the camera is physically busy in another task. Please disconnect/reconnect the camera cable or restart your system.");
            }
        }
    }

    async function startVideoFeed(constraints) {
        localStream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = localStream;
        
        connState.textContent = "Online";
        connState.style.color = "var(--success)";
        
        video.onloadedmetadata = () => {
            const w = video.videoWidth;
            const h = video.videoHeight;
            resOut.textContent = `${w} x ${h}`;
            
            const gcd = (a, b) => b ? gcd(b, a % b) : a;
            const div = gcd(w, h);
            aspectOut.textContent = `${w/div}:${h/div}`;
        };
    }

    function showAlert(type, msg) {
        if(!msg) { statusAlert.style.display = "none"; return; }
        statusAlert.className = `status-msg msg-${type}`;
        statusAlert.textContent = msg;
        statusAlert.style.display = "block";
    }

    selector.addEventListener('change', (e) => {
        if (e.target.value) executeRescueStream(e.target.value);
    });
</script>
</body>
</html>
