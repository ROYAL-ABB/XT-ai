<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xt-ai // Live Motion & Identity Suite</title>
    <style>
        :root {
            --bg: #090d16;
            --panel: #131a26;
            --accent: #2563eb;
            --success: #059669;
            --error: #dc2626;
            --warn: #d97706;
            --text: #f1f5f9;
            --text-muted: #64748b;
            --border: #1e293b;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            height: 100vh;
            box-sizing: border-box;
        }

        .app-container {
            width: 100%;
            max-width: 1300px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            height: 100%;
        }

        @media (min-width: 992px) {
            .app-container { 
                grid-template-columns: 2.8fr 1.2fr;
                grid-template-rows: auto 1fr;
            }
        }

        header {
            grid-column: 1 / -1;
            text-align: center;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        h1 { margin: 0 0 5px 0; font-size: 1.8rem; letter-spacing: 0.5px; }
        header p { margin: 0; color: var(--text-muted); }

        .panel {
            background: var(--panel);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .workspace-left {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .viewer-box {
            width: 100%;
            position: relative;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #334155;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        canvas#motionOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .controls-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        select, button {
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }

        select {
            background: #1e293b;
            color: var(--text);
            border: 1px solid #334155;
            flex: 1;
            min-width: 150px;
        }

        .btn-blue { background: var(--accent); color: white; }
        .btn-warn { background: var(--warn); color: white; }

        .sensitivity-panel {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            color: var(--text-muted);
            background: #1e293b;
            padding: 8px 14px;
            border-radius: 6px;
            border: 1px solid #334155;
        }

        .sidebar-right {
            max-height: 75vh;
            overflow: hidden;
        }

        .sidebar-title {
            margin: 0 0 15px 0;
            font-size: 1.2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .counter-badge {
            background: var(--accent);
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 20px;
        }

        .capture-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-right: 5px;
        }

        .capture-card {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #1c2638;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #2e3f59;
            cursor: pointer;
            transition: transform 0.2s ease, border-color 0.2s ease;
            animation: slideIn 0.3s ease-out;
        }

        .capture-card:hover {
            transform: scale(1.02);
            border-color: var(--accent);
            background: #233047;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .capture-card img {
            width: 70px;
            height: 70px;
            border-radius: 6px;
            object-fit: cover;
            border: 1px solid #475569;
        }

        .capture-details {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .capture-name { font-size: 0.85rem; font-weight: 600; color: #60a5fa; }
        .capture-time { font-size: 0.75rem; color: var(--text-muted); }

        .status-msg {
            grid-column: 1 / -1;
            padding: 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            display: none;
        }
        .msg-warn { background: rgba(217, 119, 6, 0.15); border: 1px solid var(--warn); color: #fde68a; }
        .msg-error { background: rgba(220, 38, 38, 0.15); border: 1px solid var(--error); color: #fca5a5; }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(5, 8, 15, 0.9);
            backdrop-filter: blur(8px);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: var(--panel);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid var(--border);
            max-width: 90%;
            max-height: 85%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            position: relative;
            transform: scale(0.95);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-content img {
            max-width: 100%;
            max-height: 60vh;
            border-radius: 8px;
            border: 1px solid #334155;
            object-fit: contain;
        }

        .modal-close-btn {
            position: absolute;
            top: -15px;
            right: -15px;
            width: 36px;
            height: 36px;
            background: var(--error);
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 2px solid var(--panel);
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>xt-ai // Real-Time Motion Matrix</h1>
        <p>Autonomous pixel-variance tracking and event logging workstation.</p>
    </header>

    <div id="statusAlert" class="status-msg"></div>

    <div class="panel workspace-left">
        <div class="viewer-box">
            <video id="viewscreen" autoplay playsinline muted></video>
            <canvas id="motionOverlay"></canvas>
        </div>
        <div class="controls-row">
            <button class="btn-blue" id="initBtn">Scan Channels</button>
            <select id="selector"><option value="">Awaiting Hardware Scan...</option></select>
            <button class="btn-warn" id="bypassBtn" style="display:none;">Force Default Cam</button>
            
            <div class="sensitivity-panel">
                <label for="thresholdSlider">Sensitivity Threshold</label>
                <input type="range" id="thresholdSlider" min="10" max="60" value="30" style="cursor:pointer; accent-color:var(--accent);">
            </div>
        </div>
    </div>

    <div class="panel sidebar-right">
        <h3 class="sidebar-title">
            Activity Event Log 
            <span class="counter-badge" id="logCount">0 Logs</span>
        </h3>
        <div class="capture-list" id="captureContainer"></div>
    </div>
</div>

<div class="modal-overlay" id="imageModal">
    <div class="modal-content">
        <div class="modal-close-btn" id="modalClose">✕</div>
        <img id="modalTargetImg" src="" alt="Expanded View" />
        <div style="text-align: center;">
            <h4 id="modalTargetName" style="margin: 0 0 5px 0; color: #60a5fa;"></h4>
            <p id="modalTargetTime" style="margin: 0; font-size: 0.85rem; color: var(--text-muted);"></p>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('viewscreen');
    const overlay = document.getElementById('motionOverlay');
    const context = overlay.getContext('2d');
    
    const initBtn = document.getElementById('initBtn');
    const selector = document.getElementById('selector');
    const bypassBtn = document.getElementById('bypassBtn');
    const statusAlert = document.getElementById('statusAlert');
    const captureContainer = document.getElementById('captureContainer');
    const logCount = document.getElementById('logCount');
    const thresholdSlider = document.getElementById('thresholdSlider');

    const imageModal = document.getElementById('imageModal');
    const modalClose = document.getElementById('modalClose');
    const modalTargetImg = document.getElementById('modalTargetImg');
    const modalTargetName = document.getElementById('modalTargetName');
    const modalTargetTime = document.getElementById('modalTargetTime');

    let localStream = null;
    let animationFrameId = null;
    
    // Core Computer Vision Vector Variables
    let prevFrameData = null;
    let lastCaptureTime = 0;
    const CAPTURE_COOLDOWN_MS = 3000; 
    let activeLogCount = 0;

    // Synthesized Audio Trigger Architecture
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playShutterSound() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(600, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.12);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.13);
    }

    initBtn.addEventListener('click', async () => {
        showAlert("", "");
        bypassBtn.style.display = "none";
        try {
            const check = await navigator.mediaDevices.getUserMedia({ video: true });
            check.getTracks().forEach(t => t.stop()); 
            await findVideoChannels();
        } catch (e) {
            showAlert("error", `Permission Blocked: ${e.message}`);
        }
    });

    bypassBtn.addEventListener('click', async () => {
        showAlert("", "");
        if (localStream) { localStream.getTracks().forEach(t => t.stop()); }
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true });
            bindStreamToUI(localStream);
        } catch (e) {
            showAlert("error", `Bypass failed. System hardware layer entirely blocked.`);
        }
    });

    async function findVideoChannels() {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoDevices = devices.filter(d => d.kind === 'videoinput');

        selector.innerHTML = '';
        if (videoDevices.length === 0) {
            selector.innerHTML = '<option>No hardware discovered</option>';
            return;
        }

        videoDevices.forEach((cam, index) => {
            const node = document.createElement('option');
            node.value = cam.deviceId;
            node.text = cam.label || `Video Channel ${index + 1}`;
            selector.appendChild(node);
        });

        executeRescueStream(videoDevices[0].deviceId);
    }

    async function executeRescueStream(hardwareId) {
        if (localStream) { localStream.getTracks().forEach(t => t.stop()); }
        let options = { video: { deviceId: hardwareId ? { exact: hardwareId } : undefined } };
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia(options);
            bindStreamToUI(stream);
        } catch (firstError) {
            let rescueOptions = {
                video: {
                    deviceId: hardwareId ? { exact: hardwareId } : undefined,
                    width: { ideal: 640 }, 
                    height: { ideal: 480 }
                }
            };
            try {
                const stream = await navigator.mediaDevices.getUserMedia(rescueOptions);
                bindStreamToUI(stream);
            } catch (secondError) {
                bypassBtn.style.display = "inline-block";
                showAlert("error", "Hardware Critical: Camera busy. Click 'Force Default Cam'.");
            }
        }
    }

    function bindStreamToUI(stream) {
        localStream = stream;
        video.srcObject = stream;
        showAlert("", ""); 
        
        video.onloadedmetadata = () => {
            overlay.width = video.videoWidth;
            overlay.height = video.videoHeight;
            startMotionDetectionPipeline();
        };
    }

    // Core Frame Differential Loop (Runs ~30-60FPS bare metal canvas comparison)
    function startMotionDetectionPipeline() {
        if (animationFrameId) {
            cancelAnimationFrame(animationFrameId);
        }

        // Dedicated low-res hidden canvas for processing pixel delta to keep performance high
        const processWidth = 200;
        const processHeight = 150;
        const processCanvas = document.createElement('canvas');
        processCanvas.width = processWidth;
        processCanvas.height = processHeight;
        const processCtx = processCanvas.getContext('2d');

        function scanFrame() {
            if (video.paused || video.ended) {
                animationFrameId = requestAnimationFrame(scanFrame);
                return;
            }

            // 1. Draw live feed snippet downsampled onto process surface
            processCtx.drawImage(video, 0, 0, processWidth, processHeight);
            const currentFrameData = processCtx.getImageData(0, 0, processWidth, processHeight);
            
            context.clearRect(0, 0, overlay.width, overlay.height);

            if (prevFrameData) {
                let changedPixelsCount = 0;
                
                // Get sensitivity boundary threshold value out of slider input invertedly
                const threshold = parseInt(thresholdSlider.value);

                // Analyze frame buffer array matrix channels (R, G, B, A)
                for (let i = 0; i < currentFrameData.data.length; i += 4) {
                    const rDiff = Math.abs(currentFrameData.data[i] - prevFrameData.data[i]);
                    const gDiff = Math.abs(currentFrameData.data[i+1] - prevFrameData.data[i+1]);
                    const bDiff = Math.abs(currentFrameData.data[i+2] - prevFrameData.data[i+2]);
                    
                    // If visual delta shifts past baseline configuration threshold
                    if ((rDiff + gDiff + bDiff) / 3 > threshold) {
                        changedPixelsCount++;
                    }
                }

                // If massive visual movement cluster detected across over 2.5% of the frame panel space
                if (changedPixelsCount > (processWidth * processHeight) * 0.025) {
                    // Draw visual target tracking boundary border alert indicator
                    context.strokeStyle = 'rgba(217, 119, 6, 0.7)';
                    context.lineWidth = 6;
                    context.strokeRect(10, 10, overlay.width - 20, overlay.height - 20);
                    
                    context.fillStyle = 'rgba(217, 119, 6, 0.05)';
                    context.fillRect(10, 10, overlay.width - 20, overlay.height - 20);

                    // Automate snapshot snapshot process loop
                    const now = Date.now();
                    if (now - lastCaptureTime > CAPTURE_COOLDOWN_MS) {
                        lastCaptureTime = now;
                        captureMotionEvent();
                    }
                }
            }

            // Deep copy raw frame snapshot array data to cache reference vector
            prevFrameData = currentFrameData;
            animationFrameId = requestAnimationFrame(scanFrame);
        }

        animationFrameId = requestAnimationFrame(scanFrame);
    }

    function captureMotionEvent() {
        const snapCanvas = document.createElement('canvas');
        snapCanvas.width = video.videoWidth;
        snapCanvas.height = video.videoHeight;
        
        const snapCtx = snapCanvas.getContext('2d');
        snapCtx.drawImage(video, 0, 0, snapCanvas.width, snapCanvas.height);
        
        const dataUrl = snapCanvas.toDataURL('image/png');
        playShutterSound();
        
        activeLogCount++;
        logCount.textContent = `${activeLogCount} Events`;

        const timestamp = new Date().toLocaleTimeString();
        const eventTitle = `Motion Event #${2000 + activeLogCount}`;
        const timeText = `Logged at ${timestamp}`;
        
        const card = document.createElement('div');
        card.className = 'capture-card';
        card.style.borderLeft = '4px solid var(--warn)';
        card.innerHTML = `
            <img src="${dataUrl}" alt="Motion Tracker Log" />
            <div class="capture-details">
                <div class="capture-name" style="color:#f59e0b;">${eventTitle}</div>
                <div class="capture-time">${timeText}</div>
            </div>
        `;
        
        card.addEventListener('click', () => {
            modalTargetImg.src = dataUrl;
            modalTargetName.textContent = eventTitle;
            modalTargetName.style.color = '#f59e0b';
            modalTargetTime.textContent = timeText;
            imageModal.style.display = 'flex';
            setTimeout(() => imageModal.classList.add('active'), 10);
        });
        
        captureContainer.insertBefore(card, captureContainer.firstChild);
    }

    function closeModal() {
        imageModal.classList.remove('active');
        setTimeout(() => { imageModal.style.display = 'none'; }, 300);
    }

    modalClose.addEventListener('click', closeModal);
    imageModal.addEventListener('click', (e) => {
        if (e.target === imageModal) closeModal();
    });

    function showAlert(type, msg) {
        if(!msg) { statusAlert.style.display = "none"; return; }
        statusAlert.className = `status-msg msg-${type}`;
        statusAlert.textContent = msg;
        statusAlert.style.display = "block";
    }

    selector.addEventListener('change', (e) => {
        if (e.target.value) executeRescueStream(e.target.value);
    });
</script>
</body>
</html>
