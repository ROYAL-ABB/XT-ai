<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYS.MATRIX // AI Vision Analytics</title>
    <!-- Importing TensorFlow.js and COCO-SSD Object Recognition Engine -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        :root {
            --bg: #050811;
            --panel: #0d121f;
            --accent: #2563eb;
            --success: #00ffaa;
            --error: #ff3b3b;
            --text: #f1f5f9;
            --border: #1e293b;
        }

        body {
            font-family: 'Courier New', Courier, monospace, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            height: 100vh;
            box-sizing: border-box;
        }

        .app-container {
            width: 100%;
            max-width: 1400px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            height: 100%;
        }

        @media (min-width: 992px) {
            .app-container { 
                grid-template-columns: 2.8fr 1.2fr;
                grid-template-rows: auto 1fr;
            }
        }

        header {
            grid-column: 1 / -1;
            padding-bottom: 10px;
            border-bottom: 2px dashed #1e293b;
        }

        h1 { margin: 0 0 5px 0; font-size: 1.5rem; letter-spacing: 1px; color: var(--success); }
        header p { margin: 0; color: #64748b; font-size: 0.85rem; }

        .panel {
            background: var(--panel);
            border-radius: 4px;
            padding: 20px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.9);
        }

        .workspace-left {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .viewer-box {
            width: 100%;
            position: relative;
            aspect-ratio: 16 / 9;
            background: #010205;
            border-radius: 4px;
            overflow: hidden;
            border: 2px solid #27354f;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        canvas#motionOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .system-status-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 255, 170, 0.1);
            padding: 6px 14px;
            border-radius: 3px;
            border: 1px solid var(--success);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 20;
            font-size: 0.75rem;
            font-weight: 900;
            color: #fff;
            backdrop-filter: blur(8px);
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--success);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        .controls-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            background: #060912;
            padding: 15px;
            border-radius: 4px;
            border: 1px solid #1e293b;
        }

        select, button {
            padding: 10px 16px;
            border-radius: 3px;
            font-size: 0.85rem;
            font-weight: bold;
            font-family: inherit;
            border: 1px solid #27354f;
            cursor: pointer;
        }

        select { background: #111827; color: var(--text); flex: 1; min-width: 150px; }
        .btn-blue { background: #1e40af; color: white; border-color: #3b82f6; }

        .sidebar-right {
            max-height: 75vh;
            overflow: hidden;
        }

        .sidebar-title {
            margin: 0 0 15px 0;
            font-size: 0.95rem;
            letter-spacing: 1px;
            border-bottom: 2px dashed var(--border);
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #94a3b8;
        }

        .counter-badge {
            background: #111827;
            color: var(--success);
            font-size: 0.75rem;
            padding: 4px 10px;
            border: 1px solid #27354f;
        }

        .capture-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .capture-card {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #060912;
            padding: 12px;
            border-radius: 4px;
            border: 1px solid #1e293b;
        }

        .capture-card img {
            width: 100%;
            height: auto;
            border-radius: 2px;
            border: 1px solid #27354f;
            background: #000;
        }

        .capture-details {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .meta-line-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .capture-name { font-size: 0.8rem; font-weight: bold; color: var(--success); }
        .capture-time { font-size: 0.75rem; color: #64748b; }
        
        .intelligence-box {
            font-size: 0.75rem;
            background: #111827;
            padding: 8px;
            border-radius: 2px;
            border-left: 3px solid var(--accent);
            color: #cbd5e1;
            line-height: 1.4;
        }

        .intelligence-box span {
            color: var(--success);
            font-weight: bold;
        }

        .download-btn {
            background: #111827;
            color: var(--success);
            border: 1px solid #00ffaa33;
            padding: 5px 10px;
            font-size: 0.75rem;
            text-decoration: none;
            text-align: center;
            font-weight: bold;
            margin-top: 4px;
        }
        .download-btn:hover { background: #00ffaa11; border-color: var(--success); }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>SYS.MATRIX // NEURAL SNAPSHOT SUITE</h1>
        <p>Object tracking, color recognition, and fluid interpolation vectors powered by TensorFlow AI.</p>
    </header>

    <div class="panel workspace-left">
        <div class="viewer-box">
            <div class="system-status-badge">
                <div class="pulse-dot"></div>
                <span id="statusMessage">CORE INITIALIZING...</span>
            </div>
            
            <video id="viewscreen" autoplay playsinline muted></video>
            <canvas id="motionOverlay"></canvas>
        </div>
        <div class="controls-row">
            <button class="btn-blue" id="initBtn">MOUNT AI PERIPHERALS</button>
            <select id="selector"><option value="">WAITING ON HARDWARE...</option></select>
        </div>
    </div>

    <div class="panel sidebar-right">
        <h3 class="sidebar-title">
            CAPTURED ARCHIVE
            <span class="counter-badge" id="logCount">0 REELS</span>
        </h3>
        <div class="capture-list" id="captureContainer"></div>
    </div>
</div>

<script>
    const video = document.getElementById('viewscreen');
    const overlay = document.getElementById('motionOverlay');
    const context = overlay.getContext('2d');
    
    const initBtn = document.getElementById('initBtn');
    const selector = document.getElementById('selector');
    const captureContainer = document.getElementById('captureContainer');
    const logCount = document.getElementById('logCount');
    const statusMessage = document.getElementById('statusMessage');

    let localStream = null;
    let animationFrameId = null;
    let prevFrameData = null;
    let activeLogCount = 0;
    let netModel = null;
    
    // Smooth Interpolation Variables
    let currentX = 0, currentY = 0, currentW = 0, currentH = 0;
    let targetX = 0, targetY = 0, targetW = 0, targetH = 0;
    const interpolationFactor = 0.15; // Lower values = smoother, higher values = faster movement

    let motionDetectedActive = false;
    let frameMotionResetTimeout = null;
    let currentObjectClassification = "Unknown Subject";
    let currentObjectChroma = "Analyzing hue...";

    // Color Analytics Engine
    function extractChromaProfile(r, g, b) {
        if (r > 200 && g > 200 && b > 200) return "White/Bright Reflective";
        if (r < 60 && g < 60 && b < 60) return "Black/Dark Shade";
        
        let max = Math.max(r, g, b);
        if (max === r) return (r - g > 40 && r - b > 40) ? "Red/Warm Spectrum" : "Orange/Brown Tone";
        if (max === g) return "Green Spectrum";
        if (max === b) return "Blue/Cold Palette";
        
        if (Math.abs(r - g) < 20 && r > 120) return "Yellow/Amber Accent";
        return "Mixed Neutral Blend";
    }

    // Load AI Model on Start
    async function loadNeuralArchitecture() {
        statusMessage.textContent = "LOADING NEURAL MODEL...";
        netModel = await cocoSsd.load();
        statusMessage.textContent = "AI LOGIC ONLINE. MOUNT CAMERA.";
    }
    loadNeuralArchitecture();

    initBtn.addEventListener('click', async () => {
        try {
            const check = await navigator.mediaDevices.getUserMedia({ video: true });
            check.getTracks().forEach(t => t.stop()); 
            await findVideoChannels();
        } catch (e) {
            statusMessage.textContent = "CAMERA ACCESS DENIED";
        }
    });

    async function findVideoChannels() {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoDevices = devices.filter(d => d.kind === 'videoinput');
        selector.innerHTML = '';
        if (videoDevices.length === 0) return;

        videoDevices.forEach((cam, index) => {
            const node = document.createElement('option');
            node.value = cam.deviceId;
            node.text = cam.label || `STREAM DEVICE-${index + 1}`;
            selector.appendChild(node);
        });
        executeRescueStream(videoDevices[0].deviceId);
    }

    async function executeRescueStream(hardwareId) {
        if (localStream) { localStream.getTracks().forEach(t => t.stop()); }
        localStream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: { exact: hardwareId } } });
        video.srcObject = localStream;
        video.onloadedmetadata = () => {
            overlay.width = video.videoWidth;
            overlay.height = video.videoHeight;
            statusMessage.textContent = "SYSTEM LIVE // SCANNING";
            startVisionPipeline();
        };
    }

    function startVisionPipeline() {
        if (animationFrameId) cancelAnimationFrame(animationFrameId);

        const processWidth = 160;
        const processHeight = 120;
        const processCanvas = document.createElement('canvas');
        processCanvas.width = processWidth;
        processCanvas.height = processHeight;
        const processCtx = processCanvas.getContext('2d');

        // Periodically run AI object classification inside the canvas stream
        setInterval(async () => {
            if (!video.paused && video.readyState >= 2 && netModel && motionDetectedActive) {
                const predictions = await netModel.detect(video);
                if (predictions.length > 0) {
                    // Grab top confidence object
                    currentObjectClassification = predictions[0].class.toUpperCase();
                } else {
                    currentObjectClassification = "OBJECT UNKNOWN";
                }
            }
        }, 400);

        function processFrameLoop() {
            if (video.paused || video.ended) {
                animationFrameId = requestAnimationFrame(processFrameLoop);
                return;
            }

            processCtx.drawImage(video, 0, 0, processWidth, processHeight);
            const currentFrameData = processCtx.getImageData(0, 0, processWidth, processHeight);
            context.clearRect(0, 0, overlay.width, overlay.height);

            let hasMotion = false;
            let minX = processWidth, maxX = 0;
            let minY = processHeight, maxY = 0;
            let changedCount = 0;
            let sumR = 0, sumG = 0, sumB = 0;

            if (prevFrameData) {
                for (let y = 0; y < processHeight; y++) {
                    for (let x = 0; x < processWidth; x++) {
                        const i = (y * processWidth + x) * 4;
                        const diff = (Math.abs(currentFrameData.data[i] - prevFrameData.data[i]) +
                                      Math.abs(currentFrameData.data[i+1] - prevFrameData.data[i+1]) +
                                      Math.abs(currentFrameData.data[i+2] - prevFrameData.data[i+2])) / 3;
                        
                        if (diff > 25) { // Sensitivity threshold
                            changedCount++;
                            sumR += currentFrameData.data[i];
                            sumG += currentFrameData.data[i+1];
                            sumB += currentFrameData.data[i+2];

                            if (x < minX) minX = x;
                            if (x > maxX) maxX = x;
                            if (y < minY) minY = y;
                            if (y > maxY) maxY = y;
                        }
                    }
                }

                if (changedCount > 12) { 
                    hasMotion = true;
                    let avgR = Math.round(sumR / changedCount);
                    let avgG = Math.round(sumG / changedCount);
                    let avgB = Math.round(sumB / changedCount);
                    currentObjectChroma = extractChromaProfile(avgR, avgG, avgB);
                }
            }

            if (hasMotion && minX <= maxX && minY <= maxY) {
                const scaleX = overlay.width / processWidth;
                const scaleY = overlay.height / processHeight;
                const padding = 20;
                
                targetX = Math.max(0, (minX * scaleX) - padding);
                targetY = Math.max(0, (minY * scaleY) - padding);
                targetW = Math.min(overlay.width - targetX, ((maxX - minX) * scaleX) + (padding * 2));
                targetH = Math.min(overlay.height - targetY, ((maxY - minY) * scaleY) + (padding * 2));

                if (!motionDetectedActive) {
                    motionDetectedActive = true;
                    statusMessage.textContent = "LOCKING SCENE TARGET...";
                }
                clearTimeout(frameMotionResetTimeout);
            } else {
                if (motionDetectedActive && !frameMotionResetTimeout) {
                    // Capture snapshot instantly when motion ceases completely
                    frameMotionResetTimeout = setTimeout(() => {
                        takeTelemetrySnapshot();
                        motionDetectedActive = false;
                        statusMessage.textContent = "SYSTEM LIVE // SCANNING";
                        targetW = 0; targetH = 0; // Contract brackets
                    }, 400); 
                }
            }

            // Smooth Dampening Bounding Interpolation
            currentX += (targetX - currentX) * interpolationFactor;
            currentY += (targetY - currentY) * interpolationFactor;
            currentW += (targetW - currentW) * interpolationFactor;
            currentH += (targetH - currentH) * interpolationFactor;

            // Render HUD target brackets if dimensions exist
            if (currentW > 5) {
                context.strokeStyle = 'var(--success)';
                context.lineWidth = 2;
                const len = Math.min(20, currentW * 0.2);
                
                context.beginPath(); context.moveTo(currentX, currentY + len); context.lineTo(currentX, currentY); context.lineTo(currentX + len, currentY); context.stroke();
                context.beginPath(); context.moveTo(currentX + currentW, currentY + len); context.lineTo(currentX + currentW, currentY); context.lineTo(currentX + currentW - len, currentY); context.stroke();
                context.beginPath(); context.moveTo(currentX, currentY + currentH - len); context.lineTo(currentX, currentY + currentH); context.lineTo(currentX + len, currentY + currentH); context.stroke();
                context.beginPath(); context.moveTo(currentX + currentW, currentY + currentH - len); context.lineTo(currentX + currentW, currentY + currentH); context.lineTo(currentX + currentW - len, currentY + currentH); context.stroke();

                context.fillStyle = 'var(--success)';
                context.font = 'bold 11px monospace';
                context.fillText(`AI ID: ${currentObjectClassification}`, currentX + 4, currentY - 24);
                context.fillText(`CHROMA: ${currentObjectChroma}`, currentX + 4, currentY - 8);
            }

            prevFrameData = currentFrameData;
            animationFrameId = requestAnimationFrame(processFrameLoop);
        }

        animationFrameId = requestAnimationFrame(processFrameLoop);
    }

    function takeTelemetrySnapshot() {
        activeLogCount++;
        logCount.textContent = `${activeLogCount} REELS`;

        // Draw current video frame onto an invisible offscreen canvas to grab the image file
        const captureCanvas = document.createElement('canvas');
        captureCanvas.width = video.videoWidth;
        captureCanvas.height = video.videoHeight;
        const captureCtx = captureCanvas.getContext('2d');
        captureCtx.drawImage(video, 0, 0, captureCanvas.width, captureCanvas.height);
        
        const dataUrl = captureCanvas.toDataURL('image/jpeg');
        const timestamp = new Date().toLocaleTimeString();
        
        const card = document.createElement('div');
        card.className = 'capture-card';
        
        card.innerHTML = `
            <img src="${dataUrl}" alt="Secured Telemetry Snapshot" />
            <div class="capture-details">
                <div class="meta-line-main">
                    <div class="capture-name">SNAP_LOG_${7000 + activeLogCount}</div>
                    <div class="capture-time">[${timestamp}]</div>
                </div>
                <div class="intelligence-box">
                    IDENTIFIED: <span>${currentObjectClassification}</span><br>
                    DOMINANT HUE: <span>${currentObjectChroma}</span>
                </div>
                <a href="${dataUrl}" download="Matrix_Snap_${7000 + activeLogCount}.jpg" class="download-btn">DOWNLOAD SNAPSHOT</a>
            </div>
        `;
        
        captureContainer.insertBefore(card, captureContainer.firstChild);
    }

    selector.addEventListener('change', (e) => {
        if (e.target.value) executeRescueStream(e.target.value);
    });
</script>
</body>
</html>
