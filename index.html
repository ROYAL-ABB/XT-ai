<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX.MATRIX // Ultimate Precision Suite</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        :root {
            --bg: #03060f;
            --panel: #0a0f1d;
            --accent: #3b82f6;
            --success: #00ff66;
            --alert: #ffaa00;
            --text: #e2e8f0;
            --border: #1e293b;
            --record-red: #ef4444;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            height: 100vh;
            box-sizing: border-box;
        }

        .app-container {
            width: 100%;
            max-width: 1600px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            height: 100%;
        }

        @media (min-width: 992px) {
            .app-container { 
                grid-template-columns: 3fr 1fr;
                grid-template-rows: auto 1fr;
            }
        }

        header {
            grid-column: 1 / -1;
            padding-bottom: 12px;
            border-bottom: 2px solid #1e293b;
        }

        h1 { margin: 0; font-size: 1.3rem; font-weight: 800; letter-spacing: 2px; color: var(--success); }
        header p { margin: 4px 0 0 0; color: #64748b; font-size: 0.8rem; }

        .panel {
            background: var(--panel);
            border-radius: 6px;
            padding: 20px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .workspace-left {
            gap: 15px;
        }

        .viewer-box {
            width: 100%;
            position: relative;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #24334d;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        canvas#motionOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .system-status-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(3, 6, 15, 0.85);
            padding: 8px 14px;
            border-radius: 4px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 20;
            font-size: 0.75rem;
            font-family: monospace;
            font-weight: bold;
            backdrop-filter: blur(10px);
        }

        .status-indicators {
            display: flex;
            gap: 6px;
        }

        .indicator-dot {
            width: 8px;
            height: 8px;
            background: #334155;
            border-radius: 50%;
            transition: all 0.3s;
        }
        
        .indicator-dot.rec-active {
            background: var(--record-red);
            box-shadow: 0 0 8px var(--record-red);
            animation: flash 0.8s infinite alternate;
        }

        .indicator-dot.shutter-active {
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
        }

        @keyframes flash { from { opacity: 0.3; } to { opacity: 1; } }

        .controls-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            background: #070c17;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #1e293b;
        }

        select, button {
            padding: 10px 16px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
            font-family: inherit;
            border: 1px solid #24334d;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        select { background: #0f172a; color: var(--text); flex: 1; min-width: 150px; }
        
        .btn-blue { background: var(--accent); color: white; border: none; }
        
        .btn-control { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
        .btn-control.active-rec { background: #7f1d1d; color: white; border-color: #b91c1c; }
        .btn-control.active-shutter { background: #064e3b; color: white; border-color: #047857; }
        
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        button:hover:not(:disabled) { filter: brightness(1.1); }

        .sidebar-right {
            max-height: 80vh;
        }

        .sidebar-title {
            margin: 0 0 15px 0;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #94a3b8;
        }

        .counter-badge {
            background: #0f172a;
            color: var(--success);
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid #24334d;
            font-family: monospace;
        }

        .capture-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-right: 4px;
        }

        .capture-card {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #070c17;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #1e293b;
        }

        .capture-card img {
            width: 100%;
            height: auto;
            border-radius: 4px;
            border: 1px solid #24334d;
            cursor: zoom-in;
            transition: transform 0.2s;
        }
        .capture-card img:hover { transform: scale(1.02); }

        .meta-line-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: monospace;
        }

        .capture-name { font-size: 0.8rem; font-weight: bold; color: var(--success); }
        .capture-time { font-size: 0.75rem; color: #64748b; }
        
        .intelligence-box {
            font-size: 0.75rem;
            background: #0f172a;
            padding: 10px;
            border-radius: 4px;
            color: #cbd5e1;
            line-height: 1.5;
            border-left: 3px solid var(--success);
        }

        .intelligence-box span {
            color: #fff;
            font-weight: 600;
        }

        /* MODAL ELEMENTS */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(3, 6, 15, 0.95);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
            backdrop-filter: blur(12px);
        }

        .modal-wrapper {
            position: relative;
            max-width: 90%;
            max-height: 85%;
        }

        .modal-img {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 6px;
            border: 2px solid #24334d;
        }

        .modal-caption {
            text-align: center;
            margin-top: 15px;
            font-family: monospace;
            color: var(--success);
            font-size: 0.9rem;
        }

        .modal-close {
            position: absolute;
            top: -40px;
            right: 0;
            color: #64748b;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
        }
        .modal-close:hover { color: white; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>APEX // SPATIAL PRECISION SUITE</h1>
        <p>Isolated component targeting module. Dynamic frame buffer logic maps targets explicitly over real-time motion deltas.</p>
    </header>

    <div class="panel workspace-left">
        <div class="viewer-box">
            <div class="system-status-badge">
                <div class="status-indicators">
                    <div class="indicator-dot" id="recIndicator" title="Recording Status"></div>
                    <div class="indicator-dot" id="shutterIndicator" title="Shutter Trigger Status"></div>
                </div>
                <span id="statusMessage">CORE ENGINE OFFLINE</span>
            </div>
            
            <video id="viewscreen" autoplay playsinline muted></video>
            <canvas id="motionOverlay"></canvas>
        </div>
        <div class="controls-row">
            <button class="btn-blue" id="initBtn">INITIALIZE OPTICS</button>
            <button class="btn-control" id="toggleRecBtn" disabled>REC STANDBY</button>
            <button class="btn-control" id="toggleShutterBtn" disabled>SHUTTER LOCKED</button>
            <select id="selector"><option value="">AWAITING HARDWARE LINK...</option></select>
        </div>
    </div>

    <div class="panel sidebar-right">
        <h3 class="sidebar-title">
            INTEL ARCHIVE
            <span class="counter-badge" id="logCount">0 CAPTURES</span>
        </h3>
        <div class="capture-list" id="captureContainer"></div>
    </div>
</div>

<!-- Lightbox Modal -->
<div class="modal-overlay" id="lightbox">
    <div class="modal-wrapper">
        <span class="modal-close" id="lightboxClose">&times;</span>
        <img class="modal-img" id="lightboxImg" src="" alt="Enlarged Telemetry View">
        <div class="modal-caption" id="lightboxCaption"></div>
    </div>
</div>

<script>
    const video = document.getElementById('viewscreen');
    const overlay = document.getElementById('motionOverlay');
    const context = overlay.getContext('2d');
    
    const initBtn = document.getElementById('initBtn');
    const toggleRecBtn = document.getElementById('toggleRecBtn');
    const toggleShutterBtn = document.getElementById('toggleShutterBtn');
    const selector = document.getElementById('selector');
    const captureContainer = document.getElementById('captureContainer');
    const logCount = document.getElementById('logCount');
    const statusMessage = document.getElementById('statusMessage');
    
    const recIndicator = document.getElementById('recIndicator');
    const shutterIndicator = document.getElementById('shutterIndicator');

    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxCaption = document.getElementById('lightboxCaption');
    const lightboxClose = document.getElementById('lightboxClose');

    let localStream = null;
    let animationFrameId = null;
    let prevFrameData = null;
    let activeLogCount = 0;
    let netModel = null;
    
    // Precise targeting coordinates
    let currentX = 0, currentY = 0, currentW = 0, currentH = 0;
    let targetX = 0, targetY = 0, targetW = 0, targetH = 0;
    const lerpSpeed = 0.40; // ultra fast reactive bracket matching

    // Operational control states
    let isRecording = false; 
    let isShutterArmed = false;
    let isMoving = false;
    let primaryLabel = "ANALYZING TARGET...";
    
    let lastCaptureTime = 0;
    const minCaptureInterval = 600; 

    async function spinUpAI() {
        statusMessage.textContent = "COMPILING MOTION NETS...";
        try {
            netModel = await cocoSsd.load();
            statusMessage.textContent = "SYSTEM DEPLOYED. INITIALIZE OPTICS HARDWARE.";
        } catch (e) {
            statusMessage.textContent = "NEURAL INFERENCE OFFLINE";
        }
    }
    spinUpAI();

    initBtn.addEventListener('click', async () => {
        try {
            const check = await navigator.mediaDevices.getUserMedia({ video: true });
            check.getTracks().forEach(t => t.stop()); 
            await discoverInputs();
            
            toggleRecBtn.disabled = false;
            toggleShutterBtn.disabled = false;
            
            // Turn recording loop state on by default out of the gate
            setRecordingState(true);
            setShutterState(true);
        } catch (e) {
            statusMessage.textContent = "INTERFACE ERROR - PERMISSION DENIED";
        }
    });

    // Recording Toggle Button
    toggleRecBtn.addEventListener('click', () => {
        setRecordingState(!isRecording);
    });

    // Shutter Trigger Toggle Button
    toggleShutterBtn.addEventListener('click', () => {
        setShutterState(!isShutterArmed);
    });

    function setRecordingState(state) {
        isRecording = state;
        if (isRecording) {
            toggleRecBtn.textContent = "STOP RECORDING";
            toggleRecBtn.classList.add("active-rec");
            recIndicator.classList.add("rec-active");
            updateStatusText();
        } else {
            toggleRecBtn.textContent = "START RECORDING";
            toggleRecBtn.classList.remove("active-rec");
            recIndicator.classList.remove("rec-active");
            targetW = 0; targetH = 0;
            context.clearRect(0, 0, overlay.width, overlay.height);
            updateStatusText();
        }
    }

    function setShutterState(state) {
        isShutterArmed = state;
        if (isShutterArmed) {
            toggleShutterBtn.textContent = "SHUTTER ACTIVE";
            toggleShutterBtn.classList.add("active-shutter");
            shutterIndicator.classList.add("shutter-active");
            updateStatusText();
        } else {
            toggleShutterBtn.textContent = "SHUTTER LOCKED";
            toggleShutterBtn.classList.remove("active-shutter");
            shutterIndicator.classList.remove("shutter-active");
            updateStatusText();
        }
    }

    function updateStatusText() {
        if (!isRecording) {
            statusMessage.textContent = "REC ENGINE STOPPED";
        } else if (isRecording && !isShutterArmed) {
            statusMessage.textContent = "RECORDING ALIVE // SHUTTER SAFE MODE";
        } else {
            statusMessage.textContent = "RECORDING ACTIVE // SHUTTER ARMED TO MOTION";
        }
    }

    async function discoverInputs() {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoDevices = devices.filter(d => d.kind === 'videoinput');
        selector.innerHTML = '';
        if (videoDevices.length === 0) return;

        videoDevices.forEach((cam, index) => {
            const opt = document.createElement('option');
            opt.value = cam.deviceId;
            opt.text = cam.label || `STREAM SOURCE LINE-${index + 1}`;
            selector.appendChild(opt);
        });
        bindCameraStream(videoDevices[0].deviceId);
    }

    async function bindCameraStream(id) {
        if (localStream) { localStream.getTracks().forEach(t => t.stop()); }
        localStream = await navigator.mediaDevices.getUserMedia({ 
            video: { deviceId: { exact: id }, width: { ideal: 1280 }, height: { ideal: 720 } } 
        });
        video.srcObject = localStream;
        video.onloadedmetadata = () => {
            overlay.width = video.videoWidth;
            overlay.height = video.videoHeight;
            executeHighPrecisionPipeline();
        };
    }

    function executeHighPrecisionPipeline() {
        if (animationFrameId) cancelAnimationFrame(animationFrameId);

        const lowResW = 240; 
        const lowResH = 135;
        const lowResCanvas = document.createElement('canvas');
        lowResCanvas.width = lowResW;
        lowResCanvas.height = lowResH;
        const lowResCtx = lowResCanvas.getContext('2d');

        // Continuous lightweight object tracking matrix thread
        setInterval(async () => {
            if (isRecording && !video.paused && video.readyState >= 2 && netModel && isMoving) {
                const results = await netModel.detect(video);
                if (results.length > 0) {
                    primaryLabel = results[0].class.toUpperCase();
                }
            }
        }, 180);

        function track() {
            if (video.paused || video.ended) {
                animationFrameId = requestAnimationFrame(track);
                return;
            }

            lowResCtx.drawImage(video, 0, 0, lowResW, lowResH);
            const currentFrame = lowResCtx.getImageData(0, 0, lowResW, lowResH);

            // Halt processing calculation if system recording is stopped
            if (!isRecording) {
                prevFrameData = currentFrame;
                animationFrameId = requestAnimationFrame(track);
                return;
            }

            context.clearRect(0, 0, overlay.width, overlay.height);

            let flowDetected = false;
            let rawMinX = lowResW, rawMaxX = 0;
            let rawMinY = lowResH, rawMaxY = 0;
            let motionDensity = 0;

            if (prevFrameData) {
                for (let y = 0; y < lowResH; y++) {
                    for (let x = 0; x < lowResW; x++) {
                        const idx = (y * lowResW + x) * 4;
                        
                        const dR = Math.abs(currentFrame.data[idx] - prevFrameData.data[idx]);
                        const dG = Math.abs(currentFrame.data[idx+1] - prevFrameData.data[idx+1]);
                        const dB = Math.abs(currentFrame.data[idx+2] - prevFrameData.data[idx+2]);
                        
                        // Heightened sensitivity configuration to parse fine elements explicitly
                        if ((dR + dG + dB) / 3 > 26) { 
                            motionDensity++;
                            if (x < rawMinX) rawMinX = x;
                            if (x > rawMaxX) rawMaxX = x;
                            if (y < rawMinY) rawMinY = y;
                            if (y > rawMaxY) rawMaxY = y;
                        }
                    }
                }

                // Strict macro density verification parameter filter
                if (motionDensity > 8) { 
                    flowDetected = true;
                }
            }

            if (flowDetected) {
                const mapX = overlay.width / lowResW;
                const mapY = overlay.height / lowResH;
                
                // Tight, zero-drift alignment calculations directly bounding moving pixels
                targetX = rawMinX * mapX;
                targetY = rawMinY * mapY;
                targetW = (rawMaxX - rawMinX) * mapX;
                targetH = (rawMaxY - rawMinY) * mapY;

                isMoving = true;

                // Fire capture engine only if the shutter module is fully active
                if (isShutterArmed) {
                    const now = performance.now();
                    if (now - lastCaptureTime > minCaptureInterval) {
                        triggerInstantCapture(primaryLabel);
                        lastCaptureTime = now;
                    }
                }
            } else {
                isMoving = false;
                targetW = 0; targetH = 0; // Collapses HUD brackets instantly
                primaryLabel = "IDENTIFYING TARGET...";
            }

            // Target crosshair vector movement transitions
            currentX += (targetX - currentX) * lerpSpeed;
            currentY += (targetY - currentY) * lerpSpeed;
            currentW += (targetW - currentW) * lerpSpeed;
            currentH += (targetH - currentH) * lerpSpeed;

            // Reticle rendering overlay logic
            if (currentW > 4 && isRecording) {
                context.strokeStyle = 'var(--success)';
                context.lineWidth = 2;
                const bracketSize = Math.min(20, currentW * 0.25);
                
                context.beginPath(); context.moveTo(currentX, currentY + bracketSize); context.lineTo(currentX, currentY); context.lineTo(currentX + bracketSize, currentY); context.stroke();
                context.beginPath(); context.moveTo(currentX + currentW, currentY + bracketSize); context.lineTo(currentX + currentW, currentY); context.lineTo(currentX + currentW - bracketSize, currentY); context.stroke();
                context.beginPath(); context.moveTo(currentX, currentY + currentH - bracketSize); context.lineTo(currentX, currentY + currentH); context.lineTo(currentX + bracketSize, currentY + currentH); context.stroke();
                context.beginPath(); context.moveTo(currentX + currentW, currentY + currentH - bracketSize); context.lineTo(currentX + currentW, currentY + currentH); context.lineTo(currentX + currentW - bracketSize, currentY + currentH); context.stroke();

                context.fillStyle = 'var(--success)';
                context.font = '600 12px system-ui';
                context.fillText(`TARGET FOCUS // ${primaryLabel}`, currentX + 4, currentY - 10);
            }

            prevFrameData = currentFrame;
            animationFrameId = requestAnimationFrame(track);
        }

        animationFrameId = requestAnimationFrame(track);
    }

    function triggerInstantCapture(labelText) {
        activeLogCount++;
        logCount.textContent = `${activeLogCount} CAPTURES`;

        const snappit = document.createElement('canvas');
        snappit.width = video.videoWidth;
        snappit.height = video.videoHeight;
        const snapCtx = snappit.getContext('2d');
        snapCtx.drawImage(video, 0, 0, snappit.width, snappit.height);
        
        const outputUri = snappit.toDataURL('image/jpeg', 0.90);
        const logTime = new Date().toLocaleTimeString();
        
        const card = document.createElement('div');
        card.className = 'capture-card';

        card.innerHTML = `
            <img src="${outputUri}" alt="Snapshot ${activeLogCount}" onclick="openLightbox('${outputUri}', 'MATRIX_LOG_${9500 + activeLogCount} [${logTime}] - TARGET: ${labelText}')" />
            <div class="meta-line-main">
                <div class="capture-name">MATRIX_LOG_${9500 + activeLogCount}</div>
                <div class="capture-time">[${logTime}]</div>
            </div>
            <div class="intelligence-box">
                TARGET MATCHED: <span>${labelText}</span>
            </div>
        `;
        
        captureContainer.insertBefore(card, captureContainer.firstChild);
    }

    function openLightbox(src, text) {
        lightboxImg.src = src;
        lightboxCaption.textContent = text;
        lightbox.style.display = 'flex';
    }

    lightbox.addEventListener('click', (e) => {
        if(e.target === lightbox || e.target === lightboxClose || e.target.classList.contains('modal-wrapper')) {
            lightbox.style.display = 'none';
            lightboxImg.src = "";
        }
    });

    selector.addEventListener('change', (e) => {
        if (e.target.value) bindCameraStream(e.target.value);
    });
</script>
</body>
</html>
