<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xeye-ai // Precision Motion Intel Suite</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        :root {
            --bg: #02040a;
            --panel: #0b0f19;
            --accent: #2563eb;
            --success: #00ff66;
            --alert: #ffaa00;
            --text: #f1f5f9;
            --border: #1e293b;
            --record-red: #ef4444;
            --hud-glow: rgba(0, 255, 102, 0.15);
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            height: 100vh;
            box-sizing: border-box;
        }

        .app-container {
            width: 100%;
            max-width: 1800px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            height: 100%;
        }

        @media (min-width: 1200px) {
            .app-container { 
                grid-template-columns: 2fr 1fr;
                grid-template-rows: auto 1fr;
            }
        }

        header {
            grid-column: 1 / -1;
            padding-bottom: 12px;
            border-bottom: 2px solid #1e293b;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        h1 { margin: 0; font-size: 1.5rem; font-weight: 900; letter-spacing: 3px; color: #fff; }
        h1 span { color: var(--success); }
        header p { margin: 4px 0 0 0; color: #64748b; font-size: 0.8rem; letter-spacing: 0.5px; }

        .panel {
            background: var(--panel);
            border-radius: 8px;
            padding: 20px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .workspace-left {
            gap: 15px;
        }

        .viewer-box {
            width: 100%;
            position: relative;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #1e293b;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        canvas#motionOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .system-status-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(2, 4, 10, 0.85);
            padding: 8px 14px;
            border-radius: 4px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 20;
            font-size: 0.75rem;
            font-family: monospace;
            font-weight: bold;
            backdrop-filter: blur(10px);
        }

        .status-indicators {
            display: flex;
            gap: 6px;
        }

        .indicator-dot {
            width: 8px;
            height: 8px;
            background: #334155;
            border-radius: 50%;
            transition: all 0.3s;
        }
        
        .indicator-dot.rec-active {
            background: var(--record-red);
            box-shadow: 0 0 8px var(--record-red);
            animation: flash 0.8s infinite alternate;
        }

        .indicator-dot.shutter-active {
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
        }

        @keyframes flash { from { opacity: 0.3; } to { opacity: 1; } }

        .controls-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            background: #090d16;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #1e293b;
        }

        select, button {
            padding: 10px 16px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
            font-family: inherit;
            border: 1px solid #1e293b;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        select { background: #0f172a; color: var(--text); flex: 1; min-width: 150px; }
        
        .btn-blue { background: var(--accent); color: white; border: none; }
        
        .btn-control { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
        .btn-control.active-rec { background: #7f1d1d; color: white; border-color: #b91c1c; }
        .btn-control.active-shutter { background: #064e3b; color: white; border-color: #047857; }
        
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        button:hover:not(:disabled) { filter: brightness(1.1); }

        .archive-split-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            height: 100%;
            min-height: 0;
        }

        .archive-column {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .sidebar-title {
            margin: 0 0 12px 0;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #94a3b8;
            padding-bottom: 6px;
            border-bottom: 1px solid #1e293b;
        }

        .counter-badge {
            background: #0f172a;
            color: var(--success);
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid #24334d;
            font-family: monospace;
        }
        
        .counter-badge.video-badge {
            color: var(--accent);
        }

        .capture-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-right: 4px;
        }

        .capture-card, .video-card {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #090d16;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #1e293b;
        }

        .capture-card img {
            width: 100%;
            height: auto;
            border-radius: 4px;
            border: 1px solid #24334d;
            cursor: zoom-in;
            transition: transform 0.2s;
        }
        .capture-card img:hover { transform: scale(1.01); }

        .video-card video {
            width: 100%;
            border-radius: 4px;
            border: 1px solid #24334d;
            background: #000;
        }

        .meta-line-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: monospace;
        }

        .capture-name { font-size: 0.75rem; font-weight: bold; color: var(--success); }
        .video-name { font-size: 0.75rem; font-weight: bold; color: var(--accent); }
        .capture-time { font-size: 0.7rem; color: #64748b; }
        
        .intelligence-box {
            font-size: 0.7rem;
            background: #0f172a;
            padding: 8px;
            border-radius: 4px;
            color: #cbd5e1;
            line-height: 1.4;
            border-left: 3px solid var(--success);
        }
        .intelligence-box.video-intel { border-left-color: var(--accent); }
        .intelligence-box span { color: #fff; font-weight: 600; }

        .btn-download-video {
            display: inline-block;
            text-align: center;
            text-decoration: none;
            background: #1e293b;
            color: #e2e8f0;
            font-size: 0.7rem;
            font-weight: bold;
            font-family: monospace;
            padding: 6px;
            border-radius: 4px;
            border: 1px solid #334155;
            transition: background 0.2s;
        }
        .btn-download-video:hover { background: #2d3748; color: var(--success); }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(2, 4, 10, 0.95);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
            backdrop-filter: blur(12px);
        }

        .modal-wrapper {
            position: relative;
            max-width: 90%;
            max-height: 85%;
        }

        .modal-img {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 6px;
            border: 2px solid #24334d;
        }

        .modal-caption {
            text-align: center;
            margin-top: 15px;
            font-family: monospace;
            color: var(--success);
            font-size: 0.9rem;
        }

        .modal-close {
            position: absolute;
            top: -40px;
            right: 0;
            color: #64748b;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
        }
        .modal-close:hover { color: white; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div>
            <h1><span>Xeye-</span>ai</h1>
            <p>High-sensitivity targeting arrays. Parallel stream recording core engine.</p>
        </div>
    </header>

    <div class="panel workspace-left">
        <div class="viewer-box">
            <div class="system-status-badge">
                <div class="status-indicators">
                    <div class="indicator-dot" id="recIndicator" title="Recording Status"></div>
                    <div class="indicator-dot" id="shutterIndicator" title="Shutter Trigger Status"></div>
                </div>
                <span id="statusMessage">CORE NETWORK DATA OFFLINE</span>
            </div>
            
            <video id="viewscreen" autoplay playsinline muted></video>
            <canvas id="motionOverlay"></canvas>
        </div>
        <div class="controls-row">
            <button class="btn-blue" id="initBtn">INITIALIZE OPTICS</button>
            <button class="btn-control" id="toggleRecBtn" disabled>REC STANDBY</button>
            <button class="btn-control" id="toggleShutterBtn" disabled>SHUTTER LOCKED</button>
            <select id="selector"><option value="">AWAITING HARDWARE LINK...</option></select>
        </div>
    </div>

    <div class="panel sidebar-right">
        <div class="archive-split-grid">
            
            <!-- COLUMN 1: PICS ARCHIVE (SNAPSHOTS) -->
            <div class="archive-column">
                <h3 class="sidebar-title">
                    TELEMETRY LOGS
                    <span class="counter-badge" id="logCount">0 PICS</span>
                </h3>
                <div class="capture-list" id="captureContainer"></div>
            </div>

            <!-- COLUMN 2: RECORD ARCHIVE (VIDEOS) -->
            <div class="archive-column">
                <h3 class="sidebar-title">
                    VIDEO VAULT
                    <span class="counter-badge video-badge" id="videoCount">0 CLIPS</span>
                </h3>
                <div class="capture-list" id="videoArchiveContainer"></div>
            </div>

        </div>
    </div>
</div>

<div class="modal-overlay" id="lightbox">
    <div class="modal-wrapper">
        <span class="modal-close" id="lightboxClose">&times;</span>
        <img class="modal-img" id="lightboxImg" src="" alt="Enlarged Telemetry View">
        <div class="modal-caption" id="lightboxCaption"></div>
    </div>
</div>

<script>
    const video = document.getElementById('viewscreen');
    const overlay = document.getElementById('motionOverlay');
    const context = overlay.getContext('2d');
    
    const initBtn = document.getElementById('initBtn');
    const toggleRecBtn = document.getElementById('toggleRecBtn');
    const toggleShutterBtn = document.getElementById('toggleShutterBtn');
    const selector = document.getElementById('selector');
    const captureContainer = document.getElementById('captureContainer');
    const videoArchiveContainer = document.getElementById('videoArchiveContainer');
    const logCount = document.getElementById('logCount');
    const videoCount = document.getElementById('videoCount');
    const statusMessage = document.getElementById('statusMessage');
    
    const recIndicator = document.getElementById('recIndicator');
    const shutterIndicator = document.getElementById('shutterIndicator');

    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxCaption = document.getElementById('lightboxCaption');
    const lightboxClose = document.getElementById('lightboxClose');

    let localStream = null;
    let animationFrameId = null;
    let prevFrameData = null;
    let activeLogCount = 0;
    let activeVideoCount = 0;
    let netModel = null;
    
    let mediaRecorder = null;
    let recordedChunks = [];
    let videoStartTime = null;

    // Smoothed target reticle coordinates
    let currentX = 0, currentY = 0, currentW = 0, currentH = 0;
    let targetX = 0, targetY = 0, targetW = 0, targetH = 0;
    const lerpSpeed = 0.25; // Balanced tracking speed to prevent stuttering

    let isRecording = false; 
    let isShutterArmed = false;
    let isMoving = false;
    let primaryLabel = "SCANNING...";
    
    let lastCaptureTime = 0;
    const minCaptureInterval = 800; 

    async function spinUpAI() {
        statusMessage.textContent = "COMPILING XEYE CORE MODELS...";
        try {
            netModel = await cocoSsd.load();
            statusMessage.textContent = "XEYE-AI DEPLOYED. READY TO OPTICIZE.";
        } catch (e) {
            statusMessage.textContent = "AI LOCAL CORING FRAMEWORK ERROR";
        }
    }
    spinUpAI();

    initBtn.addEventListener('click', async () => {
        try {
            const check = await navigator.mediaDevices.getUserMedia({ video: true });
            check.getTracks().forEach(t => t.stop()); 
            await discoverInputs();
            
            toggleRecBtn.disabled = false;
            toggleShutterBtn.disabled = false;
            
            setRecordingState(true);
            setShutterState(true);
        } catch (e) {
            statusMessage.textContent = "OPTICAL ACCESS DENIED";
        }
    });

    toggleRecBtn.addEventListener('click', () => {
        setRecordingState(!isRecording);
    });

    toggleShutterBtn.addEventListener('click', () => {
        setShutterState(!isShutterArmed);
    });

    function setRecordingState(state) {
        isRecording = state;
        if (isRecording) {
            toggleRecBtn.textContent = "STOP RECORDING";
            toggleRecBtn.classList.add("active-rec");
            recIndicator.classList.add("rec-active");
            updateStatusText();
            startHardwareRecording();
        } else {
            toggleRecBtn.textContent = "START RECORDING";
            toggleRecBtn.classList.remove("active-rec");
            recIndicator.classList.remove("rec-active");
            targetW = 0; targetH = 0;
            context.clearRect(0, 0, overlay.width, overlay.height);
            updateStatusText();
            stopHardwareRecording();
        }
    }

    function setShutterState(state) {
        isShutterArmed = state;
        if (isShutterArmed) {
            toggleShutterBtn.textContent = "SHUTTER ACTIVE";
            toggleShutterBtn.classList.add("active-shutter");
            shutterIndicator.classList.add("shutter-active");
            updateStatusText();
        } else {
            toggleShutterBtn.textContent = "SHUTTER LOCKED";
            toggleShutterBtn.classList.remove("active-shutter");
            shutterIndicator.classList.remove("shutter-active");
            updateStatusText();
        }
    }

    function updateStatusText() {
        if (!isRecording) {
            statusMessage.textContent = "XEYE RECORD VAULT IDLE";
        } else if (isRecording && !isShutterArmed) {
            statusMessage.textContent = "LIVE OPTICS RECORDING // SHUTTER SAFE";
        } else {
            statusMessage.textContent = "XEYE LIVE LOG RUNNING // SHUTTER ARMED";
        }
    }

    async function discoverInputs() {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoDevices = devices.filter(d => d.kind === 'videoinput');
        selector.innerHTML = '';
        if (videoDevices.length === 0) return;

        videoDevices.forEach((cam, index) => {
            const opt = document.createElement('option');
            opt.value = cam.deviceId;
            opt.text = cam.label || `OPTIC PORT LINE-${index + 1}`;
            selector.appendChild(opt);
        });
        bindCameraStream(videoDevices[0].deviceId);
    }

    async function bindCameraStream(id) {
        if (localStream) { localStream.getTracks().forEach(t => t.stop()); }
        localStream = await navigator.mediaDevices.getUserMedia({ 
            video: { deviceId: { exact: id }, width: { ideal: 1280 }, height: { ideal: 720 } } 
        });
        video.srcObject = localStream;
        video.onloadedmetadata = () => {
            overlay.width = video.videoWidth;
            overlay.height = video.videoHeight;
            executeHighPrecisionPipeline();
            
            if (isRecording) {
                stopHardwareRecording();
                startHardwareRecording();
            }
        };
    }

    function startHardwareRecording() {
        if (!localStream) return;
        recordedChunks = [];
        videoStartTime = new Date().toLocaleTimeString();

        let options = { mimeType: 'video/webm;codecs=vp8' };
        if (!MediaRecorder.isTypeSupported(options.mimeType)) {
            options = { mimeType: 'video/mp4' };
        }

        try {
            mediaRecorder = new MediaRecorder(localStream, options);
            mediaRecorder.ondataavailable = (e) => {
                if (e.data && e.data.size > 0) recordedChunks.push(e.data);
            };
            mediaRecorder.onstop = processAndArchiveVideo;
            mediaRecorder.start(200); 
        } catch (err) {
            console.error("Critical error mapping stream chunks:", err);
        }
    }

    function stopHardwareRecording() {
        if (mediaRecorder && mediaRecorder.state !== "inactive") {
            mediaRecorder.stop();
        }
    }

    function processAndArchiveVideo() {
        if (recordedChunks.length === 0) return;
        
        activeVideoCount++;
        videoCount.textContent = `${activeVideoCount} CLIPS`;

        const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType });
        const videoURL = URL.createObjectURL(blob);
        const fileExt = mediaRecorder.mimeType.includes('mp4') ? 'mp4' : 'webm';
        
        const videoCard = document.createElement('div');
        videoCard.className = 'video-card';
        videoCard.innerHTML = `
            <video src="${videoURL}" controls playsinline></video>
            <div class="meta-line-main">
                <div class="video-name">XEYE_CLIP_${400 + activeVideoCount}</div>
                <div class="capture-time">[${videoStartTime}]</div>
            </div>
            <div class="intelligence-box video-intel">
                STREAM DATA CONTAINER: <span>SAVED BUFFER</span>
            </div>
            <a href="${videoURL}" download="XEYE_CLIP_${400 + activeVideoCount}.${fileExt}" class="btn-download-video">
                DOWNLOAD VIDEO CAPTURE
            </a>
        `;
        
        videoArchiveContainer.insertBefore(videoCard, videoArchiveContainer.firstChild);
    }

    function executeHighPrecisionPipeline() {
        if (animationFrameId) cancelAnimationFrame(animationFrameId);

        const lowResW = 240; 
        const lowResH = 135;
        const lowResCanvas = document.createElement('canvas');
        lowResCanvas.width = lowResW;
        lowResCanvas.height = lowResH;
        const lowResCtx = lowResCanvas.getContext('2d');

        setInterval(async () => {
            if (isRecording && !video.paused && video.readyState >= 2 && netModel && isMoving) {
                const results = await netModel.detect(video);
                if (results.length > 0) {
                    primaryLabel = results[0].class.toUpperCase();
                }
            }
        }, 200);

        function track() {
            if (video.paused || video.ended) {
                animationFrameId = requestAnimationFrame(track);
                return;
            }

            lowResCtx.drawImage(video, 0, 0, lowResW, lowResH);
            const currentFrame = lowResCtx.getImageData(0, 0, lowResW, lowResH);

            if (!isRecording) {
                prevFrameData = currentFrame;
                animationFrameId = requestAnimationFrame(track);
                return;
            }

            context.clearRect(0, 0, overlay.width, overlay.height);

            let flowDetected = false;
            let rawMinX = lowResW, rawMaxX = 0;
            let rawMinY = lowResH, rawMaxY = 0;
            let motionDensity = 0;

            if (prevFrameData) {
                for (let y = 0; y < lowResH; y++) {
                    for (let x = 0; x < lowResW; x++) {
                        const idx = (y * lowResW + x) * 4;
                        const dR = Math.abs(currentFrame.data[idx] - prevFrameData.data[idx]);
                        const dG = Math.abs(currentFrame.data[idx+1] - prevFrameData.data[idx+1]);
                        const dB = Math.abs(currentFrame.data[idx+2] - prevFrameData.data[idx+2]);
                        
                        // Heightened delta scanning profile
                        if ((dR + dG + dB) / 3 > 24) { 
                            motionDensity++;
                            if (x < rawMinX) rawMinX = x;
                            if (x > rawMaxX) rawMaxX = x;
                            if (y < rawMinY) rawMinY = y;
                            if (y > rawMaxY) rawMaxY = y;
                        }
                    }
                }

                // Minimum cluster limit filter to screen out micro noise/lighting artifacts
                if (motionDensity > 12) { 
                    flowDetected = true;
                }
            }

            if (flowDetected) {
                const mapX = overlay.width / lowResW;
                const mapY = overlay.height / lowResH;
                
                // Establish exact coordinate parameters
                let calculatedX = rawMinX * mapX;
                let calculatedY = rawMinY * mapY;
                let calculatedW = (rawMaxX - rawMinX) * mapX;
                let calculatedH = (rawMaxY - rawMinY) * mapY;

                // Add predictive boundary cushioning for clean UI presentation
                const padding = 15;
                targetX = Math.max(0, calculatedX - padding);
                targetY = Math.max(0, calculatedY - padding);
                targetW = Math.min(overlay.width - targetX, calculatedW + (padding * 2));
                targetH = Math.min(overlay.height - targetY, calculatedH + (padding * 2));

                isMoving = true;

                if (isShutterArmed) {
                    const now = performance.now();
                    if (now - lastCaptureTime > minCaptureInterval) {
                        triggerInstantCapture(primaryLabel);
                        lastCaptureTime = now;
                    }
                }
            } else {
                isMoving = false;
                targetW = 0; targetH = 0; 
                primaryLabel = "SCANNING...";
            }

            // Lerp calculations for stable tracking transitions
            currentX += (targetX - currentX) * lerpSpeed;
            currentY += (targetY - currentY) * lerpSpeed;
            currentW += (targetW - currentW) * lerpSpeed;
            currentH += (targetH - currentH) * lerpSpeed;

            // Render high-visibility HUD components
            if (currentW > 15 && isRecording) {
                // Outer tracking glass back-plate for clear contrast against bright backgrounds
                context.fillStyle = 'rgba(0, 255, 102, 0.03)';
                context.fillRect(currentX, currentY, currentW, currentH);

                context.strokeStyle = 'var(--success)';
                context.lineWidth = 3; // Thicker lines for sharp visibility
                
                // Dynamic corner brackets mapping logic
                const cornerLength = Math.max(15, Math.min(30, currentW * 0.2));
                
                // Top-Left Corner
                context.beginPath(); context.moveTo(currentX, currentY + cornerLength); context.lineTo(currentX, currentY); context.lineTo(currentX + cornerLength, currentY); context.stroke();
                // Top-Right Corner
                context.beginPath(); context.moveTo(currentX + currentW, currentY + cornerLength); context.lineTo(currentX + currentW, currentY); context.lineTo(currentX + currentW - cornerLength, currentY); context.stroke();
                // Bottom-Left Corner
                context.beginPath(); context.moveTo(currentX, currentY + currentH - cornerLength); context.lineTo(currentX, currentY + currentH); context.lineTo(currentX + cornerLength, currentY + currentH); context.stroke();
                // Bottom-Right Corner
                context.beginPath(); context.moveTo(currentX + currentW, currentY + currentH - cornerLength); context.lineTo(currentX + currentW, currentY + currentH); context.lineTo(currentX + currentW - cornerLength, currentY + currentH); context.stroke();

                // Clear HUD Label Plating
                context.fillStyle = 'rgba(2, 4, 10, 0.75)';
                const textStr = `TARGET LOCK // ${primaryLabel}`;
                context.font = 'bold 12px monospace';
                const textMetrics = context.measureText(textStr);
                
                context.fillRect(currentX, currentY - 26, textMetrics.width + 16, 20);
                context.strokeStyle = 'var(--success)';
                context.lineWidth = 1;
                context.strokeRect(currentX, currentY - 26, textMetrics.width + 16, 20);

                context.fillStyle = 'var(--success)';
                context.fillText(textStr, currentX + 8, currentY - 12);
            }

            prevFrameData = currentFrame;
            animationFrameId = requestAnimationFrame(track);
        }

        animationFrameId = requestAnimationFrame(track);
    }

    function triggerInstantCapture(labelText) {
        activeLogCount++;
        logCount.textContent = `${activeLogCount} PICS`;

        const snappit = document.createElement('canvas');
        snappit.width = video.videoWidth;
        snappit.height = video.videoHeight;
        const snapCtx = snappit.getContext('2d');
        snapCtx.drawImage(video, 0, 0, snappit.width, snappit.height);
        
        const outputUri = snappit.toDataURL('image/jpeg', 0.90);
        const logTime = new Date().toLocaleTimeString();
        
        const card = document.createElement('div');
        card.className = 'capture-card';

        card.innerHTML = `
            <img src="${outputUri}" alt="Snapshot ${activeLogCount}" onclick="openLightbox('${outputUri}', 'XEYE_LOG_${9500 + activeLogCount} [${logTime}] - STATE: ${labelText}')" />
            <div class="meta-line-main">
                <div class="capture-name">XEYE_LOG_${9500 + activeLogCount}</div>
                <div class="capture-time">[${logTime}]</div>
            </div>
            <div class="intelligence-box">
                OBJECT CLASS: <span>${labelText}</span>
            </div>
        `;
        
        captureContainer.insertBefore(card, captureContainer.firstChild);
    }

    function openLightbox(src, text) {
        lightboxImg.src = src;
        lightboxCaption.textContent = text;
        lightbox.style.display = 'flex';
    }

    lightbox.addEventListener('click', (e) => {
        if(e.target === lightbox || e.target === lightboxClose || e.target.classList.contains('modal-wrapper')) {
            lightbox.style.display = 'none';
            lightboxImg.src = "";
        }
    });

    selector.addEventListener('change', (e) => {
        if (e.target.value) bindCameraStream(e.target.value);
    });
</script>
</body>
</html>
