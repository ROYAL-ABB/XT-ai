<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xt-ai // Real-Time Motion Tracker & DVR</title>
    <style>
        :root {
            --bg: #090d16;
            --panel: #131a26;
            --accent: #2563eb;
            --success: #10b981;
            --error: #ef4444;
            --warn: #f59e0b;
            --text: #f1f5f9;
            --text-muted: #64748b;
            --border: #1e293b;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            height: 100vh;
            box-sizing: border-box;
        }

        .app-container {
            width: 100%;
            max-width: 1300px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            height: 100%;
        }

        @media (min-width: 992px) {
            .app-container { 
                grid-template-columns: 2.8fr 1.2fr;
                grid-template-rows: auto 1fr;
            }
        }

        header {
            grid-column: 1 / -1;
            text-align: center;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        h1 { margin: 0 0 5px 0; font-size: 1.8rem; letter-spacing: 0.5px; }
        header p { margin: 0; color: var(--text-muted); }

        .panel {
            background: var(--panel);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .workspace-left {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .viewer-box {
            width: 100%;
            position: relative;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #334155;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        canvas#motionOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .controls-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        select, button {
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }

        select {
            background: #1e293b;
            color: var(--text);
            border: 1px solid #334155;
            flex: 1;
            min-width: 150px;
        }

        .btn-blue { background: var(--accent); color: white; }
        .btn-warn { background: var(--warn); color: white; }

        .sensitivity-panel {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            color: var(--text-muted);
            background: #1e293b;
            padding: 8px 14px;
            border-radius: 6px;
            border: 1px solid #334155;
        }

        .sidebar-right {
            max-height: 75vh;
            overflow: hidden;
        }

        .sidebar-title {
            margin: 0 0 15px 0;
            font-size: 1.2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .counter-badge {
            background: var(--error);
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 20px;
        }

        .capture-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-right: 5px;
        }

        .capture-card {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #1c2638;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #2e3f59;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .capture-card video {
            width: 100%;
            border-radius: 6px;
            background: #000;
            border: 1px solid #475569;
        }

        .capture-details {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .capture-name { font-size: 0.85rem; font-weight: 600; color: #f87171; }
        .capture-time { font-size: 0.75rem; color: var(--text-muted); }
        
        .download-btn {
            background: var(--accent);
            color: white;
            padding: 4px 8px;
            font-size: 0.75rem;
            border-radius: 4px;
            text-decoration: none;
            text-align: center;
        }

        .status-msg {
            grid-column: 1 / -1;
            padding: 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            display: none;
        }
        .msg-error { background: rgba(220, 38, 38, 0.15); border: 1px solid var(--error); color: #fca5a5; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>xt-ai // Target Motion Tracker & DVR</h1>
        <p>Real-time pixel spatial bounding squares and direct pipeline stream recording.</p>
    </header>

    <div id="statusAlert" class="status-msg"></div>

    <div class="panel workspace-left">
        <div class="viewer-box">
            <video id="viewscreen" autoplay playsinline muted></video>
            <canvas id="motionOverlay"></canvas>
        </div>
        <div class="controls-row">
            <button class="btn-blue" id="initBtn">Scan Channels</button>
            <select id="selector"><option value="">Awaiting Hardware Scan...</option></select>
            <button class="btn-warn" id="bypassBtn" style="display:none;">Force Default Cam</button>
            
            <div class="sensitivity-panel">
                <label for="thresholdSlider">Sensitivity</label>
                <input type="range" id="thresholdSlider" min="10" max="60" value="25" style="cursor:pointer; accent-color:var(--accent);">
            </div>
        </div>
    </div>

    <div class="panel sidebar-right">
        <h3 class="sidebar-title">
            Recorded Video Vault 
            <span class="counter-badge" id="logCount">0 Reels</span>
        </h3>
        <div class="capture-list" id="captureContainer"></div>
    </div>
</div>

<script>
    const video = document.getElementById('viewscreen');
    const overlay = document.getElementById('motionOverlay');
    const context = overlay.getContext('2d');
    
    const initBtn = document.getElementById('initBtn');
    const selector = document.getElementById('selector');
    const bypassBtn = document.getElementById('bypassBtn');
    const statusAlert = document.getElementById('statusAlert');
    const captureContainer = document.getElementById('captureContainer');
    const logCount = document.getElementById('logCount');
    const thresholdSlider = document.getElementById('thresholdSlider');

    let localStream = null;
    let animationFrameId = null;
    
    let prevFrameData = null;
    let activeLogCount = 0;
    
    let mediaRecorder = null;
    let recordedChunks = [];
    let isRecording = false;
    let isRecorderStopping = false;
    let lastMotionTime = 0;
    
    const RECORDING_BUFFER_MS = 4000; // Keep recording for 4 seconds after all motion stops

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playChime(type) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        if (type === 'start') {
            osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
            osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.08); // E5
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        } else {
            osc.frequency.setValueAtTime(659.25, audioCtx.currentTime);
            osc.frequency.setValueAtTime(523.25, audioCtx.currentTime + 0.08);
            gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }
    }

    initBtn.addEventListener('click', async () => {
        showAlert("", "");
        bypassBtn.style.display = "none";
        try {
            const check = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            check.getTracks().forEach(t => t.stop()); 
            await findVideoChannels();
        } catch (e) {
            showAlert("error", `Permission Blocked: ${e.message}`);
        }
    });

    bypassBtn.addEventListener('click', async () => {
        showAlert("", "");
        if (localStream) { localStream.getTracks().forEach(t => t.stop()); }
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            bindStreamToUI(localStream);
        } catch (e) {
            showAlert("error", `Bypass failed. Hardware layer entirely blocked.`);
        }
    });

    async function findVideoChannels() {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoDevices = devices.filter(d => d.kind === 'videoinput');

        selector.innerHTML = '';
        if (videoDevices.length === 0) {
            selector.innerHTML = '<option>No hardware discovered</option>';
            return;
        }

        videoDevices.forEach((cam, index) => {
            const node = document.createElement('option');
            node.value = cam.deviceId;
            node.text = cam.label || `Video Channel ${index + 1}`;
            selector.appendChild(node);
        });

        executeRescueStream(videoDevices[0].deviceId);
    }

    async function executeRescueStream(hardwareId) {
        if (localStream) { localStream.getTracks().forEach(t => t.stop()); }
        let options = { video: { deviceId: hardwareId ? { exact: hardwareId } : undefined }, audio: true };
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia(options);
            bindStreamToUI(stream);
        } catch (firstError) {
            let rescueOptions = {
                video: { deviceId: hardwareId ? { exact: hardwareId } : undefined, width: { ideal: 640 }, height: { ideal: 480 } },
                audio: true
            };
            try {
                const stream = await navigator.mediaDevices.getUserMedia(rescueOptions);
                bindStreamToUI(stream);
            } catch (secondError) {
                bypassBtn.style.display = "inline-block";
                showAlert("error", "Hardware Critical: Camera busy. Click 'Force Default Cam'.");
            }
        }
    }

    function bindStreamToUI(stream) {
        localStream = stream;
        video.srcObject = stream;
        showAlert("", ""); 
        
        video.onloadedmetadata = () => {
            overlay.width = video.videoWidth;
            overlay.height = video.videoHeight;
            startMotionDetectionPipeline();
        };
    }

    function startMotionDetectionPipeline() {
        if (animationFrameId) cancelAnimationFrame(animationFrameId);

        // Grid-based processing dimensions
        const processWidth = 160;
        const processHeight = 120;
        const processCanvas = document.createElement('canvas');
        processCanvas.width = processWidth;
        processCanvas.height = processHeight;
        const processCtx = processCanvas.getContext('2d');

        function scanFrame() {
            if (video.paused || video.ended) {
                animationFrameId = requestAnimationFrame(scanFrame);
                return;
            }

            processCtx.drawImage(video, 0, 0, processWidth, processHeight);
            const currentFrameData = processCtx.getImageData(0, 0, processWidth, processHeight);
            
            context.clearRect(0, 0, overlay.width, overlay.height);

            let motionDetected = false;
            
            // Spatial tracking box variables
            let minX = processWidth, maxX = 0;
            let minY = processHeight, maxY = 0;

            if (prevFrameData) {
                let changedPixelsCount = 0;
                const threshold = parseInt(thresholdSlider.value);

                for (let y = 0; y < processHeight; y++) {
                    for (let x = 0; x < processWidth; x++) {
                        const i = (y * processWidth + x) * 4;
                        
                        const rDiff = Math.abs(currentFrameData.data[i] - prevFrameData.data[i]);
                        const gDiff = Math.abs(currentFrameData.data[i+1] - prevFrameData.data[i+1]);
                        const bDiff = Math.abs(currentFrameData.data[i+2] - prevFrameData.data[i+2]);
                        
                        if ((rDiff + gDiff + bDiff) / 3 > threshold) {
                            changedPixelsCount++;
                            
                            // Map out the boundary extremes of the moving pixels
                            if (x < minX) minX = x;
                            if (x > maxX) maxX = x;
                            if (y < minY) minY = y;
                            if (y > maxY) maxY = y;
                        }
                    }
                }

                // Trigger threshold: minimal movement cluster size
                if (changedPixelsCount > (processWidth * processHeight) * 0.015) {
                    motionDetected = true;
                    lastMotionTime = Date.now();
                }
            }

            // Draw dynamic tracking target square if motion exists
            if (motionDetected) {
                // Scale coordinates up from downsampled calculation window to real video size
                const scaleX = overlay.width / processWidth;
                const scaleY = overlay.height / processHeight;

                const boxX = minX * scaleX;
                const boxY = minY * scaleY;
                const boxWidth = (maxX - minX) * scaleX;
                const boxHeight = (maxY - minY) * scaleY;

                // Draw bright neon bounding tracker rectangle around target
                context.strokeStyle = 'var(--success)';
                context.lineWidth = 4;
                context.strokeRect(boxX, boxY, boxWidth, boxHeight);

                // Quick small text target tag above tracking square
                context.fillStyle = 'var(--success)';
                context.font = 'bold 12px monospace';
                context.fillText('TARGET ACTIVE', boxX, boxY - 6);
            }

            // Recording state logic engine
            const now = Date.now();
            if (motionDetected) {
                if (!isRecording && !isRecorderStopping) {
                    startRecordingSequence();
                }
            } else {
                // If recording is running but motion dropped out longer than the cooldown buffer window
                if (isRecording && (now - lastMotionTime > RECORDING_BUFFER_MS)) {
                    stopRecordingSequence();
                }
            }

            // Visual Status indicator banner inside monitoring screen
            if (isRecording) {
                context.fillStyle = 'var(--error)';
                context.font = 'bold 16px sans-serif';
                context.fillText('• REC ACTIVE', 20, 35);
            }

            prevFrameData = currentFrameData;
            animationFrameId = requestAnimationFrame(scanFrame);
        }

        animationFrameId = requestAnimationFrame(scanFrame);
    }

    function startRecordingSequence() {
        isRecording = true;
        recordedChunks = [];
        playChime('start');

        let options = { mimeType: 'video/webm;codecs=vp9,opus' };
        if (!MediaRecorder.isTypeSupported(options.mimeType)) {
            options = { mimeType: 'video/webm;codecs=vp8,opus' };
        }
        if (!MediaRecorder.isTypeSupported(options.mimeType)) {
            options = { mimeType: 'video/mp4' }; 
        }

        try {
            mediaRecorder = new MediaRecorder(localStream, options);
        } catch (e) {
            mediaRecorder = new MediaRecorder(localStream); 
        }

        mediaRecorder.ondataavailable = (event) => {
            if (event.data && event.data.size > 0) {
                recordedChunks.push(event.data);
            }
        };

        mediaRecorder.onstop = () => {
            compileVideoFile();
            isRecording = false;
            isRecorderStopping = false; 
        };

        mediaRecorder.start(1000); // Collect data chunks explicitly every 1 second
    }

    function stopRecordingSequence() {
        if (mediaRecorder && mediaRecorder.state !== 'inactive' && !isRecorderStopping) {
            isRecorderStopping = true; 
            mediaRecorder.stop();
            playChime('stop');
        }
    }

    function compileVideoFile() {
        if (recordedChunks.length === 0) return;
        
        activeLogCount++;
        logCount.textContent = `${activeLogCount} Reels`;

        const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType || 'video/webm' });
        const videoUrl = URL.createObjectURL(blob);
        const timestamp = new Date().toLocaleTimeString();
        
        const card = document.createElement('div');
        card.className = 'capture-card';
        
        card.innerHTML = `
            <video src="${videoUrl}" controls playsinline></video>
            <div class="capture-details">
                <div>
                    <div class="capture-name">CLIP #${7000 + activeLogCount}</div>
                    <div class="capture-time">Recorded at ${timestamp}</div>
                </div>
                <a href="${videoUrl}" download="SecurityCapture_${7000 + activeLogCount}.webm" class="download-btn">Save File</a>
            </div>
        `;
        
        captureContainer.insertBefore(card, captureContainer.firstChild);
    }

    function showAlert(type, msg) {
        if(!msg) { statusAlert.style.display = "none"; return; }
        statusAlert.className = `status-msg msg-${type}`;
        statusAlert.textContent = msg;
        statusAlert.style.display = "block";
    }

    selector.addEventListener('change', (e) => {
        if (e.target.value) executeRescueStream(e.target.value);
    });
</script>
</body>
</html>
