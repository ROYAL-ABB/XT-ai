<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX.MATRIX // Ultimate Target Suite</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        :root {
            --bg: #03060f;
            --panel: #0a0f1d;
            --accent: #3b82f6;
            --success: #00ff66;
            --alert: #ffaa00;
            --text: #e2e8f0;
            --border: #1e293b;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            height: 100vh;
            box-sizing: border-box;
        }

        .app-container {
            width: 100%;
            max-width: 1600px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            height: 100%;
        }

        @media (min-width: 992px) {
            .app-container { 
                grid-template-columns: 3fr 1fr;
                grid-template-rows: auto 1fr;
            }
        }

        header {
            grid-column: 1 / -1;
            padding-bottom: 12px;
            border-bottom: 2px solid #1e293b;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { margin: 0; font-size: 1.3rem; font-weight: 800; letter-spacing: 2px; color: var(--success); }
        header p { margin: 4px 0 0 0; color: #64748b; font-size: 0.8rem; }

        .panel {
            background: var(--panel);
            border-radius: 6px;
            padding: 20px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .workspace-left {
            gap: 15px;
        }

        .viewer-box {
            width: 100%;
            position: relative;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #24334d;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        canvas#motionOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .system-status-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(3, 6, 15, 0.85);
            padding: 8px 14px;
            border-radius: 4px;
            border: 1px solid var(--accent);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 20;
            font-size: 0.75rem;
            font-family: monospace;
            font-weight: bold;
            backdrop-filter: blur(10px);
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent);
        }
        .pulse-dot.active {
            background: var(--success);
            box-shadow: 0 0 10px var(--success);
            animation: flash 0.3s infinite alternate;
        }
        @keyframes flash { from { opacity: 0.4; } to { opacity: 1; } }

        .controls-row {
            display: flex;
            gap: 15px;
            align-items: center;
            background: #070c17;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #1e293b;
        }

        select, button {
            padding: 10px 18px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
            font-family: inherit;
            border: 1px solid #24334d;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        select { background: #0f172a; color: var(--text); flex: 1; }
        button { background: var(--accent); color: white; border: none; }
        button:hover { filter: brightness(1.1); }

        .sidebar-right {
            max-height: 80vh;
        }

        .sidebar-title {
            margin: 0 0 15px 0;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #94a3b8;
        }

        .counter-badge {
            background: #0f172a;
            color: var(--success);
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid #24334d;
            font-family: monospace;
        }

        .capture-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-right: 4px;
        }

        .capture-card {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #070c17;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #1e293b;
        }

        .capture-card img {
            width: 100%;
            height: auto;
            border-radius: 4px;
            border: 1px solid #24334d;
        }

        .meta-line-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: monospace;
        }

        .capture-name { font-size: 0.8rem; font-weight: bold; color: var(--success); }
        .capture-time { font-size: 0.75rem; color: #64748b; }
        
        .intelligence-box {
            font-size: 0.75rem;
            background: #0f172a;
            padding: 10px;
            border-radius: 4px;
            color: #cbd5e1;
            line-height: 1.5;
            border-left: 3px solid var(--success);
        }

        .intelligence-box span {
            color: #fff;
            font-weight: 600;
        }

        .download-btn {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent);
            border: 1px solid rgba(59, 130, 246, 0.3);
            padding: 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            text-decoration: none;
            text-align: center;
            font-weight: bold;
            transition: all 0.2s;
        }
        .download-btn:hover { background: var(--accent); color: white; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div>
            <h1>APEX // HIGH-ACCURACY MOTION INTELLIGENCE</h1>
            <p>Optical flow tracking engine with deep classification matrixing.</p>
        </div>
    </header>

    <div class="panel workspace-left">
        <div class="viewer-box">
            <div class="system-status-badge">
                <div class="pulse-dot" id="statusDot"></div>
                <span id="statusMessage">CORE ENGINE OFFLINE</span>
            </div>
            
            <video id="viewscreen" autoplay playsinline muted></video>
            <canvas id="motionOverlay"></canvas>
        </div>
        <div class="controls-row">
            <button id="initBtn">INITIALIZE OPTICS</button>
            <select id="selector"><option value="">AWAITING INTERFACE...</option></select>
        </div>
    </div>

    <div class="panel sidebar-right">
        <h3 class="sidebar-title">
            INTEL ARCHIVE
            <span class="counter-badge" id="logCount">0 CAPTURES</span>
        </h3>
        <div class="capture-list" id="captureContainer"></div>
    </div>
</div>

<script>
    const video = document.getElementById('viewscreen');
    const overlay = document.getElementById('motionOverlay');
    const context = overlay.getContext('2d');
    
    const initBtn = document.getElementById('initBtn');
    const selector = document.getElementById('selector');
    const captureContainer = document.getElementById('captureContainer');
    const logCount = document.getElementById('logCount');
    const statusMessage = document.getElementById('statusMessage');
    const statusDot = document.getElementById('statusDot');

    let localStream = null;
    let animationFrameId = null;
    let prevFrameData = null;
    let activeLogCount = 0;
    let netModel = null;
    
    // Advanced tracking coordinates
    let currentX = 0, currentY = 0, currentW = 0, currentH = 0;
    let targetX = 0, targetY = 0, targetW = 0, targetH = 0;
    const lerpSpeed = 0.25; // Snappier response speed

    let isMoving = false;
    let fallbackClassification = "Analyzing environment...";
    
    // Smarter Anti-Spam: Dynamic Throttle
    let lastCaptureTime = 0;
    const minCaptureInterval = 400; // Allows up to 2.5 precise shots a second if movement shifts drastically

    async function spinUpAI() {
        statusMessage.textContent = "LOADING NEURAL MATRIX...";
        try {
            netModel = await cocoSsd.load();
            statusMessage.textContent = "READY SYSTEM FOR INGESTION";
            statusDot.style.backgroundColor = "var(--alert)";
        } catch (e) {
            statusMessage.textContent = "AI MATRIX OFFLINE";
        }
    }
    spinUpAI();

    initBtn.addEventListener('click', async () => {
        try {
            const check = await navigator.mediaDevices.getUserMedia({ video: true });
            check.getTracks().forEach(t => t.stop()); 
            await discoverInputs();
        } catch (e) {
            statusMessage.textContent = "ACCESS DENIED";
        }
    });

    async function discoverInputs() {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoDevices = devices.filter(d => d.kind === 'videoinput');
        selector.innerHTML = '';
        if (videoDevices.length === 0) return;

        videoDevices.forEach((cam, index) => {
            const opt = document.createElement('option');
            opt.value = cam.deviceId;
            opt.text = cam.label || `OPTICAL MATRIX CH-${index + 1}`;
            selector.appendChild(opt);
        });
        bindCameraStream(videoDevices[0].deviceId);
    }

    async function bindCameraStream(id) {
        if (localStream) { localStream.getTracks().forEach(t => t.stop()); }
        localStream = await navigator.mediaDevices.getUserMedia({ 
            video: { deviceId: { exact: id }, width: { ideal: 1280 }, height: { ideal: 720 } } 
        });
        video.srcObject = localStream;
        video.onloadedmetadata = () => {
            overlay.width = video.videoWidth;
            overlay.height = video.videoHeight;
            statusMessage.textContent = "MONITOR ACTIVE - FLOW ANALYSIS ENGAGED";
            statusDot.className = "pulse-dot active";
            executeHighPrecisionPipeline();
        };
    }

    // High Precision Matrix Pipeline
    function executeHighPrecisionPipeline() {
        if (animationFrameId) cancelAnimationFrame(animationFrameId);

        // Low latency downsampler for motion vector calculation
        const lowResW = 240; 
        const lowResH = 135;
        const lowResCanvas = document.createElement('canvas');
        lowResCanvas.width = lowResW;
        lowResCanvas.height = lowResH;
        const lowResCtx = lowResCanvas.getContext('2d');

        // Parallel classification network thread (does not drag video framerate)
        let primaryLabel = "TRACKING TARGET";
        let secondaryConfidence = "";
        
        setInterval(async () => {
            if (!video.paused && video.readyState >= 2 && netModel && isMoving) {
                const results = await netModel.detect(video);
                if (results.length > 0) {
                    primaryLabel = results[0].class.toUpperCase();
                    secondaryConfidence = `${Math.round(results[0].score * 100)}% Match Precision`;
                }
            }
        }, 180);

        function track() {
            if (video.paused || video.ended) {
                animationFrameId = requestAnimationFrame(track);
                return;
            }

            lowResCtx.drawImage(video, 0, 0, lowResW, lowResH);
            const currentFrame = lowResCtx.getImageData(0, 0, lowResW, lowResH);
            context.clearRect(0, 0, overlay.width, overlay.height);

            let flowDetected = false;
            let rawMinX = lowResW, rawMaxX = 0;
            let rawMinY = lowResH, rawMaxY = 0;
            let motionDensity = 0;

            if (prevFrameData) {
                // High precision macro scan loop
                for (let y = 0; y < lowResH; y += 2) {
                    for (let x = 0; x < lowResW; x += 2) {
                        const idx = (y * lowResW + x) * 4;
                        
                        // Delta measurement across full RGB channels
                        const dR = Math.abs(currentFrame.data[idx] - prevFrameData.data[idx]);
                        const dG = Math.abs(currentFrame.data[idx+1] - prevFrameData.data[idx+1]);
                        const dB = Math.abs(currentFrame.data[idx+2] - prevFrameData.data[idx+2]);
                        
                        // Low threshold ensures slow creeping movements are successfully indexed
                        if ((dR + dG + dB) / 3 > 15) { 
                            motionDensity++;
                            if (x < rawMinX) rawMinX = x;
                            if (x > rawMaxX) rawMaxX = x;
                            if (y < rawMinY) rawMinY = y;
                            if (y > rawMaxY) rawMaxY = y;
                        }
                    }
                }

                // Minimum density barrier filters background camera noise floor artifacts
                if (motionDensity > 8) { 
                    flowDetected = true;
                }
            }

            if (flowDetected) {
                const mapX = overlay.width / lowResW;
                const mapY = overlay.height / lowResH;
                
                // Generates fluid elastic target frames around movement zone
                const borderBuffer = 30;
                targetX = Math.max(0, (rawMinX * mapX) - borderBuffer);
                targetY = Math.max(0, (rawMinY * mapY) - borderBuffer);
                targetW = Math.min(overlay.width - targetX, ((rawMaxX - rawMinX) * mapX) + (borderBuffer * 2));
                targetH = Math.min(overlay.height - targetY, ((rawMaxY - rawMinY) * mapY) + (borderBuffer * 2));

                isMoving = true;
                statusMessage.textContent = "TARGET VECTOR MOVEMENT RECORDED";

                // Immediate snapshot ignition engine
                const now = performance.now();
                if (now - lastCaptureTime > minCaptureInterval) {
                    triggerInstantCapture(primaryLabel, secondaryConfidence);
                    lastCaptureTime = now;
                }
            } else {
                isMoving = false;
                // Gracefully collapse boundaries to perfect crosshair center when movement settles
                targetW = 0; targetH = 0;
            }

            // High velocity linear interpolation (lerp) calculations
            currentX += (targetX - currentX) * lerpSpeed;
            currentY += (targetY - currentY) * lerpSpeed;
            currentW += (targetW - currentW) * lerpSpeed;
            currentH += (targetH - currentH) * lerpSpeed;

            // Reticle rendering engine
            if (currentW > 4) {
                context.strokeStyle = 'var(--success)';
                context.lineWidth = 2;
                
                // Draw responsive geometric HUD corners
                const bracketSize = Math.min(25, currentW * 0.25);
                
                context.beginPath(); context.moveTo(currentX, currentY + bracketSize); context.lineTo(currentX, currentY); context.lineTo(currentX + bracketSize, currentY); context.stroke();
                context.beginPath(); context.moveTo(currentX + currentW, currentY + bracketSize); context.lineTo(currentX + currentW, currentY); context.lineTo(currentX + currentW - bracketSize, currentY); context.stroke();
                context.beginPath(); context.moveTo(currentX, currentY + currentH - bracketSize); context.lineTo(currentX, currentY + currentH); context.lineTo(currentX + bracketSize, currentY + currentH); context.stroke();
                context.beginPath(); context.moveTo(currentX + currentW, currentY + currentH - bracketSize); context.lineTo(currentX + currentW, currentY + currentH); context.lineTo(currentX + currentW - bracketSize, currentY + currentH); context.stroke();

                // Dynamic data tag placement strings
                context.fillStyle = 'var(--success)';
                context.font = '600 12px system-ui';
                context.fillText(`LOCK: ${primaryLabel}`, currentX + 6, currentY - 22);
                if(secondaryConfidence) {
                    context.fillStyle = 'var(--alert)';
                    context.fillText(secondaryConfidence, currentX + 6, currentY - 6);
                }
            }

            prevFrameData = currentFrame;
            animationFrameId = requestAnimationFrame(track);
        }

        animationFrameId = requestAnimationFrame(track);
    }

    function triggerInstantCapture(labelText, confidenceText) {
        activeLogCount++;
        logCount.textContent = `${activeLogCount} CAPTURES`;

        const snappit = document.createElement('canvas');
        snappit.width = video.videoWidth;
        snappit.height = video.videoHeight;
        const snapCtx = snappit.getContext('2d');
        snapCtx.drawImage(video, 0, 0, snappit.width, snappit.height);
        
        const outputUri = snappit.toDataURL('image/jpeg', 0.85);
        const logTime = new Date().toLocaleTimeString();
        
        const card = document.createElement('div');
        card.className = 'capture-card';

        card.innerHTML = `
            <img src="${outputUri}" alt="System Frame Log" />
            <div class="meta-line-main">
                <div class="capture-name">MATRIX_FLOW_${8000 + activeLogCount}</div>
                <div class="capture-time">[${logTime}]</div>
            </div>
            <div class="intelligence-box">
                CORE ANALYSIS: <span>${labelText}</span><br>
                METRIC STATUS: <span>${confidenceText || 'System Verifying Context...'}</span>
            </div>
            <a href="${outputUri}" download="Matrix_HighPrecision_${8000 + activeLogCount}.jpg" class="download-btn">EXTRACT DATA FRAME</a>
        `;
        
        captureContainer.insertBefore(card, captureContainer.firstChild);
    }

    selector.addEventListener('change', (e) => {
        if (e.target.value) bindCameraStream(e.target.value);
    });
</script>
</body>
</html>
